<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>The Gauntlet</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;600&family=Karla:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --panel: #141414;
    --panel-border: #2a2a2a;
    --ink: #111;
    --cream: #f5f0e8;
    --halftone: rgba(0,0,0,0.06);

    /* Canon stone colors */
    --space:   #1a4aff;   /* Space Stone - blue */
    --mind:    #f5c800;   /* Mind Stone - yellow */
    --reality: #cc1a1a;   /* Reality Stone - red */
    --power:   #9b30d4;   /* Power Stone - purple */
    --time:    #18a050;   /* Time Stone - green */
    --soul:    #e86010;   /* Soul Stone - orange */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    background: #0a0a0a;
    color: var(--cream);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== HALFTONE TEXTURE ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== COMIC PAGE LAYOUT ===== */
  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 12px 60px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ===== MASTHEAD ===== */
  .masthead {
    background: #cc1a1a;
    border: 3px solid #111;
    padding: 10px 16px 8px;
    margin-bottom: 0;
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(0,0,0,0.08) 4px,
      rgba(0,0,0,0.08) 8px
    );
  }

  .masthead-inner {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .comic-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.2rem, 9vw, 3.2rem);
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 0.9;
    text-shadow: 3px 3px 0 #800, 5px 5px 0 #111;
  }

  .masthead-meta {
    text-align: right;
  }

  .issue-num {
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    color: #f5c800;
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 #111;
  }

  .masthead-date {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sync-status {
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    height: 16px;
    transition: color 0.3s;
  }
  .sync-status.saving { color: #f5c800; font-weight: 600; }
  .sync-status.error  { color: #ff6666; font-weight: 600; }

  /* ===== COMIC PANELS ===== */
  .panel {
    border: 3px solid #111;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 5px 5px;
    pointer-events: none;
  }

  .panel-caption {
    background: #f5c800;
    color: #111;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-bottom: 2px solid #111;
    display: inline-block;
  }

  .panel-caption.red {
    background: #cc1a1a;
    color: #fff;
  }

  /* ===== STONES PANEL ===== */
  .stones-panel {
    padding: 0;
  }

  .stones-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px 0 0;
    border-bottom: 2px solid #111;
  }

  .stones-count {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    color: #f5c800;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    background: #111;
  }

  .stones-grid {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 20px 12px;
    background: radial-gradient(ellipse at 50% 100%, rgba(30,20,60,0.8) 0%, #141414 70%);
  }

  /* ===== GEM SHAPE ===== */
  .stone-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .stone {
    width: clamp(52px, 13vw, 68px);
    height: clamp(52px, 13vw, 68px);
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.1s ease;
  }

  .stone:active { transform: scale(0.85); }

  /* SVG gem */
  .stone svg.gem-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 0px transparent);
    transition: filter 0.4s ease;
  }

  /* Inactive crystal faces */
  .gem-top    { fill: rgba(255,255,255,0.06); }
  .gem-left   { fill: rgba(0,0,0,0.3); }
  .gem-right  { fill: rgba(0,0,0,0.5); }
  .gem-bottom { fill: rgba(0,0,0,0.6); }
  .gem-outline { fill: none; stroke: #333; stroke-width: 1.5; }

  /* Crystal chunk faces — inactive */
  .crystal-face-a  { fill: rgba(255,255,255,0.04); }
  .crystal-face-b  { fill: rgba(0,0,0,0.25); }
  .crystal-face-c  { fill: rgba(0,0,0,0.18); }
  .crystal-face-d  { fill: rgba(0,0,0,0.3); }
  .crystal-shine   { fill: rgba(255,255,255,0.06); }
  .crystal-shine2  { fill: rgba(255,255,255,0.03); }
  .crystal-outline { fill: none; stroke: #2a2a2a; stroke-width: 1.5; stroke-linejoin: round; }
  .crystal-core    { stop-color: #1a1a1a; }
  .crystal-mid     { stop-color: #111; }
  .crystal-edge    { stop-color: #0a0a0a; }

  /* Active crystal stones — inner glow via gradient stops + face tints */
  .stone.done[data-color="space"] svg.gem-svg   { filter: drop-shadow(0 0 10px #1a4aff) drop-shadow(0 0 28px rgba(26,74,255,0.55)); }
  .stone.done[data-color="mind"] svg.gem-svg    { filter: drop-shadow(0 0 10px #f5c800) drop-shadow(0 0 28px rgba(245,200,0,0.55)); }
  .stone.done[data-color="reality"] svg.gem-svg { filter: drop-shadow(0 0 10px #cc1a1a) drop-shadow(0 0 28px rgba(204,26,26,0.55)); }
  .stone.done[data-color="power"] svg.gem-svg   { filter: drop-shadow(0 0 10px #9b30d4) drop-shadow(0 0 28px rgba(155,48,212,0.55)); }
  .stone.done[data-color="time"] svg.gem-svg    { filter: drop-shadow(0 0 10px #18a050) drop-shadow(0 0 28px rgba(24,160,80,0.55)); }

  .stone.done[data-color="space"]   .crystal-core  { stop-color: #6688ff; }
  .stone.done[data-color="space"]   .crystal-mid   { stop-color: #1a3acc; }
  .stone.done[data-color="space"]   .crystal-edge  { stop-color: #060e55; }
  .stone.done[data-color="space"]   .crystal-face-a { fill: rgba(120,160,255,0.25); }
  .stone.done[data-color="space"]   .crystal-face-b { fill: rgba(10,30,120,0.5); }
  .stone.done[data-color="space"]   .crystal-face-c { fill: rgba(20,50,160,0.35); }
  .stone.done[data-color="space"]   .crystal-face-d { fill: rgba(6,14,80,0.6); }
  .stone.done[data-color="space"]   .crystal-shine  { fill: rgba(180,210,255,0.35); }
  .stone.done[data-color="space"]   .crystal-shine2 { fill: rgba(200,220,255,0.2); }
  .stone.done[data-color="space"]   .crystal-outline { stroke: rgba(80,130,255,0.4); }

  .stone.done[data-color="mind"]    .crystal-core  { stop-color: #ffe555; }
  .stone.done[data-color="mind"]    .crystal-mid   { stop-color: #c89000; }
  .stone.done[data-color="mind"]    .crystal-edge  { stop-color: #553f00; }
  .stone.done[data-color="mind"]    .crystal-face-a { fill: rgba(255,230,80,0.25); }
  .stone.done[data-color="mind"]    .crystal-face-b { fill: rgba(120,80,0,0.5); }
  .stone.done[data-color="mind"]    .crystal-face-c { fill: rgba(160,110,0,0.35); }
  .stone.done[data-color="mind"]    .crystal-face-d { fill: rgba(60,40,0,0.6); }
  .stone.done[data-color="mind"]    .crystal-shine  { fill: rgba(255,250,180,0.4); }
  .stone.done[data-color="mind"]    .crystal-shine2 { fill: rgba(255,245,200,0.22); }
  .stone.done[data-color="mind"]    .crystal-outline { stroke: rgba(220,170,0,0.4); }

  .stone.done[data-color="reality"] .crystal-core  { stop-color: #ff5555; }
  .stone.done[data-color="reality"] .crystal-mid   { stop-color: #aa1010; }
  .stone.done[data-color="reality"] .crystal-edge  { stop-color: #440404; }
  .stone.done[data-color="reality"] .crystal-face-a { fill: rgba(255,100,100,0.25); }
  .stone.done[data-color="reality"] .crystal-face-b { fill: rgba(100,10,10,0.5); }
  .stone.done[data-color="reality"] .crystal-face-c { fill: rgba(140,20,20,0.35); }
  .stone.done[data-color="reality"] .crystal-face-d { fill: rgba(50,4,4,0.6); }
  .stone.done[data-color="reality"] .crystal-shine  { fill: rgba(255,180,180,0.32); }
  .stone.done[data-color="reality"] .crystal-shine2 { fill: rgba(255,200,200,0.18); }
  .stone.done[data-color="reality"] .crystal-outline { stroke: rgba(200,40,40,0.4); }

  .stone.done[data-color="power"]   .crystal-core  { stop-color: #cc66ff; }
  .stone.done[data-color="power"]   .crystal-mid   { stop-color: #7010b0; }
  .stone.done[data-color="power"]   .crystal-edge  { stop-color: #2e0844; }
  .stone.done[data-color="power"]   .crystal-face-a { fill: rgba(180,80,255,0.25); }
  .stone.done[data-color="power"]   .crystal-face-b { fill: rgba(70,10,120,0.5); }
  .stone.done[data-color="power"]   .crystal-face-c { fill: rgba(100,20,150,0.35); }
  .stone.done[data-color="power"]   .crystal-face-d { fill: rgba(30,8,55,0.6); }
  .stone.done[data-color="power"]   .crystal-shine  { fill: rgba(210,160,255,0.32); }
  .stone.done[data-color="power"]   .crystal-shine2 { fill: rgba(220,180,255,0.18); }
  .stone.done[data-color="power"]   .crystal-outline { stroke: rgba(150,50,220,0.4); }

  .stone.done[data-color="time"]    .crystal-core  { stop-color: #44e077; }
  .stone.done[data-color="time"]    .crystal-mid   { stop-color: #108838; }
  .stone.done[data-color="time"]    .crystal-edge  { stop-color: #043314; }
  .stone.done[data-color="time"]    .crystal-face-a { fill: rgba(80,220,120,0.25); }
  .stone.done[data-color="time"]    .crystal-face-b { fill: rgba(8,80,30,0.5); }
  .stone.done[data-color="time"]    .crystal-face-c { fill: rgba(16,110,45,0.35); }
  .stone.done[data-color="time"]    .crystal-face-d { fill: rgba(4,40,15,0.6); }
  .stone.done[data-color="time"]    .crystal-shine  { fill: rgba(160,255,200,0.32); }
  .stone.done[data-color="time"]    .crystal-shine2 { fill: rgba(180,255,210,0.18); }
  .stone.done[data-color="time"]    .crystal-outline { stroke: rgba(30,160,80,0.4); }

  .stone.done .gem-outline { stroke: rgba(255,255,255,0.3); }

  /* No persistent pulse border — glow only */

  /* Burst */
  .stone-burst {
    position: absolute;
    inset: -24px;
    pointer-events: none;
    z-index: 20;
  }

  .stone-burst::before, .stone-burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.2);
  }

  .stone.bursting[data-color="space"]   .stone-burst::before { background: radial-gradient(circle, rgba(74,122,255,0.8) 0%, transparent 65%); animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="mind"]    .stone-burst::before { background: radial-gradient(circle, rgba(255,224,64,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="reality"] .stone-burst::before { background: radial-gradient(circle, rgba(232,64,64,0.8) 0%, transparent 65%);   animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="power"]   .stone-burst::before { background: radial-gradient(circle, rgba(192,96,240,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="time"]    .stone-burst::before { background: radial-gradient(circle, rgba(64,208,112,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }

  .stone.bursting .stone-burst::after {
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
    animation: gem-burst2 0.8s ease-out 0.04s forwards;
  }

  @keyframes gem-burst  { 0% { transform: scale(0.2); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
  @keyframes gem-burst2 { 0% { transform: scale(0.2); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

  @keyframes gauntlet-flash {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    50%  { opacity: 0.7; }
    100% { opacity: 0; }
  }

  /* Space — warp ripple */
  @keyframes space-warp {
    0%   { transform: scale(0.2); opacity: 0; }
    30%  { opacity: 1; }
    100% { transform: scale(2.8); opacity: 0; }
  }
  @keyframes page-warp {
    0%   { transform: scale(1); filter: none; }
    20%  { transform: scale(1.012); filter: hue-rotate(20deg) brightness(1.08); }
    60%  { transform: scale(0.994); filter: hue-rotate(-10deg); }
    100% { transform: scale(1); filter: none; }
  }

  /* Mind — invert flash */
  @keyframes mind-invert {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes mind-body {
    0%   { filter: none; }
    12%  { filter: invert(0.9) brightness(1.4) saturate(2); }
    35%  { filter: invert(0.3) brightness(1.1); }
    100% { filter: none; }
  }

  /* Reality — crack fade */
  @keyframes reality-crack {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    70%  { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Power — shockwave ring */
  @keyframes power-ring {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(18); opacity: 0; }
  }
  @keyframes power-shake {
    0%   { transform: translateX(0); }
    10%  { transform: translateX(-8px) rotate(-0.5deg); }
    25%  { transform: translateX(7px) rotate(0.5deg); }
    40%  { transform: translateX(-5px); }
    55%  { transform: translateX(4px); }
    70%  { transform: translateX(-2px); }
    100% { transform: translateX(0); }
  }
  @keyframes quick-flash {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Time — sepia slowdown */
  @keyframes time-sepia {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes time-body {
    0%   { filter: none; }
    10%  { filter: sepia(0.85) saturate(0.4) brightness(0.88); }
    60%  { filter: sepia(0.3) saturate(0.8); }
    100% { filter: none; }
  }

  .stone-name {
    font-family: 'Oswald', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #444;
    text-align: center;
    transition: color 0.4s;
  }

  .stone.done[data-color="space"]   .stone-name { color: #4a7aff; }
  .stone.done[data-color="mind"]    .stone-name { color: #f5c800; }
  .stone.done[data-color="reality"] .stone-name { color: #e84040; }
  .stone.done[data-color="power"]   .stone-name { color: #c060f0; }
  .stone.done[data-color="time"]    .stone-name { color: #40d070; }

  /* ===== SOUL STONE PANEL ===== */
  .soul-panel {
    border-top: 0;
    padding: 0;
  }

  .soul-panel-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 20px;
    background: radial-gradient(ellipse at 50% 60%, rgba(80,30,0,0.5) 0%, #141414 70%);
    gap: 16px;
  }

  .soul-stone {
    width: clamp(130px, 36vw, 170px);
    height: clamp(130px, 36vw, 170px);
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.12s ease;
  }

  .soul-stone:active { transform: scale(0.92); }

  .soul-stone svg.gem-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 0px transparent);
    transition: filter 0.5s ease;
  }

  .soul-stone.done svg.gem-svg {
    filter: drop-shadow(0 0 14px #e86010) drop-shadow(0 0 40px rgba(232,96,16,0.7)) drop-shadow(0 0 80px rgba(232,96,16,0.3));
  }

  /* Inactive soul crystal */
  .soul-face-a  { fill: rgba(255,255,255,0.04); }
  .soul-face-b  { fill: rgba(0,0,0,0.25); }
  .soul-face-c  { fill: rgba(0,0,0,0.18); }
  .soul-face-d  { fill: rgba(0,0,0,0.3); }
  .soul-shine   { fill: rgba(255,255,255,0.05); }
  .soul-shine2  { fill: rgba(255,255,255,0.03); }
  .soul-outline { fill: none; stroke: #2a2a2a; stroke-width: 2; stroke-linejoin: round; }
  .soul-core    { stop-color: #1a1a1a; }
  .soul-mid     { stop-color: #111; }
  .soul-edge    { stop-color: #0a0a0a; }

  /* Active soul crystal */
  .soul-stone.done .soul-core   { stop-color: #ff9a50; }
  .soul-stone.done .soul-mid    { stop-color: #c04010; }
  .soul-stone.done .soul-edge   { stop-color: #401404; }
  .soul-stone.done .soul-face-a { fill: rgba(255,160,80,0.25); }
  .soul-stone.done .soul-face-b { fill: rgba(120,40,8,0.5); }
  .soul-stone.done .soul-face-c { fill: rgba(160,55,12,0.35); }
  .soul-stone.done .soul-face-d { fill: rgba(55,14,4,0.6); }
  .soul-stone.done .soul-shine  { fill: rgba(255,210,160,0.35); }
  .soul-stone.done .soul-shine2 { fill: rgba(255,225,180,0.2); }
  .soul-stone.done .soul-outline { stroke: rgba(220,100,20,0.45); }

  .soul-burst {
    position: absolute;
    inset: -40px;
    pointer-events: none;
    z-index: 20;
  }

  .soul-burst::before, .soul-burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.2);
  }

  .soul-stone.bursting .soul-burst::before {
    background: radial-gradient(circle, rgba(255,144,64,0.8) 0%, transparent 65%);
    animation: gem-burst 0.9s ease-out forwards;
  }
  .soul-stone.bursting .soul-burst::after {
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    animation: gem-burst2 1.1s ease-out 0.06s forwards;
  }

  .soul-label {
    text-align: center;
  }

  .soul-label .soul-name {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    color: #e86010;
    letter-spacing: 0.1em;
    text-shadow: 2px 2px 0 #111;
  }

  .soul-label .soul-duration {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    color: #555;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ===== SPEECH BUBBLE SUMMARY ===== */
  .bubble-panel {
    border-top: 0;
  }

  .speech-bubble {
    margin: 14px;
    background: var(--cream);
    color: #111;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.6;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: #111;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: var(--cream);
  }

  .bubble-count { color: #cc1a1a; }
  .bubble-soul  { color: #e86010; }

  .complete-msg {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    color: #9b30d4;
    letter-spacing: 0.08em;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 1s ease;
    text-shadow: 1px 1px 0 #111;
  }
  .complete-msg.show { opacity: 1; }

  /* ===== ACTION PANEL ===== */
  .action-panel {
    border-top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #111;
  }

  .undo-btn {
    background: none;
    border: 1.5px solid #333;
    color: #555;
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .undo-btn:hover { border-color: #555; color: #888; }

  .reset-note {
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
  }

  /* ===== HISTORY PANEL ===== */
  .history-panel {
    border-top: 0;
  }

  .history-body {
    padding: 8px 12px 4px;
  }

  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid #1e1e1e;
  }
  .history-row:last-child { border-bottom: none; }

  .history-date {
    font-family: 'Oswald', sans-serif;
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .history-pills { display: flex; gap: 6px; }

  .pill {
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .pill-short { background: rgba(26,74,255,0.15); color: #4a7aff; border: 1px solid rgba(26,74,255,0.2); }
  .pill-short.incomplete { background: transparent; color: #333; border-color: #222; }
  .pill-long  { background: rgba(232,96,16,0.15); color: #e86010; border: 1px solid rgba(232,96,16,0.2); }
  .pill-long.incomplete  { background: transparent; color: #333; border-color: #222; }

  .history-empty {
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    color: #333;
    text-align: center;
    padding: 20px 0;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Speed lines decoration on soul panel */
  .speed-lines {
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg, transparent 8deg, rgba(255,255,255,0.01) 8deg, rgba(255,255,255,0.01) 9deg);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="page">

  <!-- MASTHEAD -->
  <div class="masthead">
    <div class="masthead-inner">
      <div class="comic-title">The<br>Gauntlet</div>
      <div class="masthead-meta">
        <div class="issue-num" id="issue-num">#001</div>
        <div class="masthead-date" id="date-display"></div>
      </div>
    </div>
  </div>

  <!-- STONES PANEL -->
  <div class="panel stones-panel">
    <div class="stones-panel-header">
      <div class="panel-caption">2-minute stones</div>
      <div class="stones-count"><span id="short-count">0</span> / 5</div>
    </div>
    <div class="stones-grid" id="short-orbs"></div>
  </div>

  <!-- SOUL STONE PANEL -->
  <div class="panel soul-panel">
    <div class="panel-caption red">Soul Stone &mdash; 10 minutes</div>
    <div class="soul-panel-body" style="position:relative;">
      <div class="speed-lines"></div>
      <div class="soul-stone" id="long-orb" onclick="clickLong()" ontouchend="event.preventDefault();clickLong()">
        <div class="soul-burst"></div>
        <svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="glow-soul" cx="46%" cy="38%" r="54%">
              <stop offset="0%" class="soul-core" stop-opacity="0.9"/>
              <stop offset="60%" class="soul-mid" stop-opacity="0.6"/>
              <stop offset="100%" class="soul-edge" stop-opacity="0.88"/>
            </radialGradient>
          </defs>
          <polygon fill="url(#glow-soul)" points="50,6 76,18 90,46 84,78 60,102 40,102 16,78 12,46 26,18"/>
          <polygon class="soul-face-a" points="50,6 76,18 60,34"/>
          <polygon class="soul-face-b" points="76,18 90,46 70,44"/>
          <polygon class="soul-face-c" points="12,46 26,18 44,38"/>
          <polygon class="soul-face-d" points="84,78 60,102 62,74"/>
          <polygon class="soul-shine"  points="34,20 52,8 54,32 38,26"/>
          <polygon class="soul-shine2" points="60,12 74,22 66,34"/>

        <div class="soul-name">Soul Stone</div>
        <div class="soul-duration">10-minute breath</div>

    </div>
  </div>

  <!-- SPEECH BUBBLE PANEL -->
  <div class="panel bubble-panel">
    <div class="speech-bubble">
      <span class="bubble-count" id="short-done">0</span> of 5 stones &bull; Soul Stone <span class="bubble-soul" id="long-status">remaining</span>
      <div class="complete-msg" id="complete-msg">POWER INFINITE! ALL SIX COLLECTED!</div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="panel action-panel">
    <button class="undo-btn" onclick="undoLast()">↩ Undo last</button>
    <div class="reset-note">Resets at midnight</div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel history-panel">
    <div class="panel-caption">Past days</div>
    <div class="history-body">
      <div id="history-list"><div class="history-empty">No past sessions yet</div></div>
    </div>
  </div>

</div>

<script>
  const STONE_COLORS = ['space','mind','reality','power','time'];
  const STONE_NAMES  = ['Space','Mind','Reality','Power','Time'];

  // Unique gem cut per stone
  const GEM_SHAPES = {
    // Space: chunky irregular crystal, wider base
    space: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-space" cx="45%" cy="40%" r="55%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-space)" points="50,8 72,18 88,42 82,72 60,98 38,96 16,70 14,44 28,18"/>
      <polygon class="crystal-face-a" points="50,8 72,18 58,38"/>
      <polygon class="crystal-face-b" points="72,18 88,42 68,45"/>

      <polygon class="crystal-face-d" points="82,72 60,98 62,68"/>

      <polygon class="crystal-shine2" points="58,14 70,22 64,34"/>
      <polyline class="crystal-outline" points="50,8 72,18 88,42 82,72 60,98 38,96 16,70 14,44 28,18 50,8"/>
    </svg>`,
    // Mind: tall angular shard with notch
    mind: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-mind" cx="50%" cy="35%" r="55%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-mind)" points="50,6 76,20 84,50 74,80 56,100 44,100 26,80 18,48 26,20"/>
      <polygon class="crystal-face-a" points="50,6 76,20 60,32"/>
      <polygon class="crystal-face-b" points="76,20 84,50 66,44"/>
      <polygon class="crystal-face-c" points="18,48 26,20 42,36"/>
      <polygon class="crystal-face-d" points="56,100 74,80 68,70"/>
      <polygon class="crystal-shine"  points="34,22 50,8 52,30 38,26"/>
      <polygon class="crystal-shine2" points="60,12 74,24 66,36"/>
      <polyline class="crystal-outline" points="50,6 76,20 84,50 74,80 56,100 44,100 26,80 18,48 26,20 50,6"/>
    </svg>`,
    // Reality: leaning lopsided chunk
    reality: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-reality" cx="55%" cy="38%" r="52%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-reality)" points="54,6 80,16 90,44 86,76 62,100 36,98 14,72 12,42 30,16"/>
      <polygon class="crystal-face-a" points="54,6 80,16 64,30"/>
      <polygon class="crystal-face-b" points="80,16 90,44 72,40"/>
      <polygon class="crystal-face-c" points="12,42 30,16 44,38"/>
      <polygon class="crystal-face-d" points="86,76 62,100 64,72"/>
      <polygon class="crystal-shine"  points="38,18 56,8 58,30 42,26"/>
      <polygon class="crystal-shine2" points="64,10 78,20 70,32"/>
      <polyline class="crystal-outline" points="54,6 80,16 90,44 86,76 62,100 36,98 14,72 12,42 30,16 54,6"/>
    </svg>`,
    // Power: wide squat boulder shape
    power: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-power" cx="45%" cy="42%" r="52%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-power)" points="46,8 70,12 90,36 92,66 72,96 48,100 24,94 10,66 12,36 32,12"/>
      <polygon class="crystal-face-a" points="46,8 70,12 60,34"/>
      <polygon class="crystal-face-b" points="70,12 90,36 72,38"/>
      <polygon class="crystal-face-c" points="12,36 32,12 44,36"/>
      <polygon class="crystal-face-d" points="92,66 72,96 70,72"/>
      <polygon class="crystal-shine"  points="34,14 50,8 52,32 38,26"/>
      <polygon class="crystal-shine2" points="58,10 72,18 66,30"/>
      <polyline class="crystal-outline" points="46,8 70,12 90,36 92,66 72,96 48,100 24,94 10,66 12,36 32,12 46,8"/>
    </svg>`,
    // Time: tall thin spike
    time: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-time" cx="48%" cy="32%" r="52%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-time)" points="50,4 68,16 78,44 74,78 58,102 42,102 26,78 24,44 34,16"/>
      <polygon class="crystal-face-a" points="50,4 68,16 56,30"/>
      <polygon class="crystal-face-b" points="68,16 78,44 62,40"/>
      <polygon class="crystal-face-c" points="24,44 34,16 46,34"/>
      <polygon class="crystal-face-d" points="74,78 58,102 56,76"/>
      <polygon class="crystal-shine"  points="36,18 50,6 52,28 38,22"/>
      <polygon class="crystal-shine2" points="56,8 68,18 62,28"/>
      <polyline class="crystal-outline" points="50,4 68,16 78,44 74,78 58,102 42,102 26,78 24,44 34,16 50,4"/>
    </svg>`
  };

  function gemSVG(color) {
    return GEM_SHAPES[color] || GEM_SHAPES.space;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();

  let state = { short_count: 0, long_done: false };

  function setSyncStatus(msg, cls) {}  // silent

  async function loadAll() {
    try {
      const res = await fetch('/api/logs');
      if (!res.ok) throw new Error();
      const logs = await res.json();
      const today = todayStr();
      const todayLog = logs.find(l => l.date === today);
      if (todayLog) {
        state.short_count  = todayLog.short_count  ?? 0;
        state.long_done    = todayLog.long_done    ?? false;
        state.issue_number = todayLog.issue_number ?? null;
      }
      // If no entry for today yet, create one to get an issue number assigned
      if (!todayLog) {
        const r = await fetch('/api/logs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: today, short_count: 0, long_done: false })
        });
        if (r.ok) {
          const created = await r.json();
          state.issue_number = created.issue_number;
        }
      }
      setIssueNum(state.issue_number);
      buildStones(); updateUI();
      renderHistory(logs.filter(l => l.date !== today));
    } catch(e) {
      setSyncStatus('offline', 'error');
      buildStones(); updateUI(); renderHistory([]);
    }
  }

  function setIssueNum(n) {
    if (!n) return;
    document.getElementById('issue-num').textContent = '#' + String(n).padStart(3, '0');
  }

  async function saveState() {
    setSyncStatus('saving…', 'saving');
    try {
      const res = await fetch('/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: todayStr(), short_count: state.short_count, long_done: state.long_done })
      });
      if (!res.ok) throw new Error();
      const saved = await res.json();
      if (saved.issue_number) setIssueNum(saved.issue_number);
      setSyncStatus('saved ✓', 'saving');
      setTimeout(() => setSyncStatus(''), 2000);
    } catch(e) { setSyncStatus('save failed', 'error'); }
  }

  function buildStones() {
    const container = document.getElementById('short-orbs');
    container.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'stone-wrap';

      const stone = document.createElement('div');
      stone.className = 'stone' + (i < state.short_count ? ' done' : '');
      stone.id = `stone-${i}`;
      stone.dataset.color = STONE_COLORS[i];
      stone.innerHTML = `<div class="stone-burst"></div>${gemSVG(STONE_COLORS[i])}`;
      stone.addEventListener('click', () => clickStone(i));
      stone.addEventListener('touchend', (e) => { e.preventDefault(); clickStone(i); });

      const label = document.createElement('div');
      label.className = 'stone-name';
      label.textContent = STONE_NAMES[i];

      wrap.appendChild(stone);
      wrap.appendChild(label);
      container.appendChild(wrap);
    }
  }

  function clickStone(i) {
    if (i !== state.short_count) return;
    state.short_count++;
    saveState();
    const stone = document.getElementById(`stone-${i}`);
    stone.classList.add('bursting');
    setTimeout(() => { stone.classList.remove('bursting'); stone.classList.add('done'); }, 650);
    updateUI();
    setTimeout(() => stoneEffect(STONE_COLORS[i]), 150);
  }

  function stoneEffect(color) {
    if (color === 'space')   effectSpace();
    if (color === 'mind')    effectMind();
    if (color === 'reality') effectReality();
    if (color === 'power')   effectPower();
    if (color === 'time')    effectTime();
  }

  // SPACE — ripple warp wave across the page
  function effectSpace() {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed; inset:0; z-index:9998; pointer-events:none;
      background: radial-gradient(ellipse at 50% 50%, transparent 0%, rgba(26,74,255,0.18) 40%, transparent 70%);
      animation: space-warp 0.9s cubic-bezier(0.2,0.8,0.4,1) forwards;
    `;
    document.body.appendChild(el);
    // Second ripple ring
    const el2 = document.createElement('div');
    el2.style.cssText = `
      position:fixed; inset:0; z-index:9997; pointer-events:none;
      background: radial-gradient(ellipse at 50% 50%, transparent 10%, rgba(74,122,255,0.1) 50%, transparent 80%);
      animation: space-warp 1.1s 0.1s cubic-bezier(0.2,0.8,0.4,1) forwards;
    `;
    document.body.appendChild(el2);
    const page = document.querySelector('.page');
    page.style.animation = 'page-warp 0.7s ease-out forwards';
    setTimeout(() => { el.remove(); el2.remove(); page.style.animation = ''; }, 1200);
  }

  // MIND — full screen color inversion flash
  function effectMind() {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed; inset:0; z-index:9998; pointer-events:none;
      background: rgba(245,200,0,0.12);
      animation: mind-invert 0.8s ease-out forwards;
    `;
    document.body.appendChild(el);
    document.body.style.animation = 'mind-body 0.5s ease-out forwards';
    setTimeout(() => { el.remove(); document.body.style.animation = ''; }, 900);
  }

  // REALITY — cracks spider across screen then dissolve
  function effectReality() {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 400 800');
    svg.style.cssText = `position:fixed;inset:0;width:100%;height:100%;z-index:9998;pointer-events:none;opacity:0;animation:reality-crack 1.2s ease-out forwards;`;
    const lines = [
      'M200,400 L80,180 L30,60','M200,400 L320,200 L370,80','M200,400 L60,500 L10,700',
      'M200,400 L340,520 L390,720','M200,400 L150,600 L120,800','M200,400 L250,600 L280,800',
      'M200,400 L100,380 L20,360','M200,400 L300,390 L390,370'
    ];
    lines.forEach((d,i) => {
      const path = document.createElementNS('http://www.w3.org/2000/svg','polyline');
      path.setAttribute('points', d.replace(/M|L/g,'').trim());
      path.setAttribute('stroke','rgba(204,26,26,0.7)');
      path.setAttribute('stroke-width', i < 4 ? '1.5' : '1');
      path.setAttribute('fill','none');
      path.setAttribute('stroke-linecap','round');
      svg.appendChild(path);
    });
    // Red tint overlay
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('width','400'); rect.setAttribute('height','800');
    rect.setAttribute('fill','rgba(204,26,26,0.08)');
    svg.insertBefore(rect, svg.firstChild);
    document.body.appendChild(svg);
    setTimeout(() => svg.remove(), 1300);
  }

  // POWER — screen shake + purple shockwave ring
  function effectPower() {
    // Shockwave
    const ring = document.createElement('div');
    ring.style.cssText = `
      position:fixed; left:50%; top:50%; width:40px; height:40px;
      margin:-20px 0 0 -20px; border-radius:50%; z-index:9998; pointer-events:none;
      border: 3px solid rgba(155,48,212,0.9);
      box-shadow: 0 0 20px rgba(155,48,212,0.6), inset 0 0 20px rgba(155,48,212,0.3);
      animation: power-ring 0.7s ease-out forwards;
    `;
    document.body.appendChild(ring);
    const ring2 = document.createElement('div');
    ring2.style.cssText = ring.style.cssText;
    ring2.style.animation = 'power-ring 0.85s 0.12s ease-out forwards';
    ring2.style.borderColor = 'rgba(155,48,212,0.5)';
    document.body.appendChild(ring2);
    // Shake
    document.querySelector('.page').style.animation = 'power-shake 0.45s ease-out forwards';
    // Purple flash
    const flash = document.createElement('div');
    flash.style.cssText = `position:fixed;inset:0;z-index:9997;pointer-events:none;background:rgba(155,48,212,0.15);animation:quick-flash 0.4s ease-out forwards;`;
    document.body.appendChild(flash);
    setTimeout(() => { ring.remove(); ring2.remove(); flash.remove(); document.querySelector('.page').style.animation=''; }, 1000);
  }

  // TIME — sepia wash that slowly lifts
  function effectTime() {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed; inset:0; z-index:9998; pointer-events:none;
      background: rgba(24,160,80,0.08);
      animation: time-sepia 1.4s ease-out forwards;
    `;
    document.body.appendChild(el);
    document.body.style.animation = 'time-body 1.2s ease-out forwards';
    setTimeout(() => { el.remove(); document.body.style.animation = ''; }, 1500);
  }

  function clickLong() {
    if (state.long_done) return;
    state.long_done = true;
    saveState();
    const orb = document.getElementById('long-orb');
    orb.classList.add('bursting');
    setTimeout(() => { orb.classList.remove('bursting'); orb.classList.add('done'); }, 950);
    updateUI();
    // Gauntlet complete — full screen flash
    setTimeout(() => gauntletFlash(), 400);
  }

  function gauntletFlash() {
    const flash = document.createElement('div');
    flash.style.cssText = `
      position:fixed; inset:0; z-index:9999; pointer-events:none;
      background: radial-gradient(ellipse at 50% 50%, rgba(255,200,100,0.95) 0%, rgba(232,96,16,0.85) 35%, rgba(150,40,0,0.6) 65%, transparent 100%);
      animation: gauntlet-flash 1.4s ease-out forwards;
    `;
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 1500);
  }

  function undoLast() {
    if (state.long_done) { state.long_done = false; }
    else if (state.short_count > 0) { state.short_count--; }
    saveState(); buildStones(); updateUI();
  }

  function updateUI() {
    document.getElementById('short-count').textContent = state.short_count;
    document.getElementById('short-done').textContent  = state.short_count;
    document.getElementById('long-status').textContent = state.long_done ? 'collected!' : 'remaining';
    document.getElementById('complete-msg').classList.toggle('show', state.short_count >= 5 && state.long_done);
    document.getElementById('long-orb').classList.toggle('done', state.long_done);
  }

  function renderHistory(logs) {
    const list = document.getElementById('history-list');
    if (!logs || logs.length === 0) {
      list.innerHTML = '<div class="history-empty">No past sessions yet</div>';
      return;
    }
    list.innerHTML = logs.map(log => {
      const d = new Date(log.date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
      const sf = log.short_count >= 5, lf = log.long_done;
      return `<div class="history-row">
        <div class="history-date">${label}</div>
        <div class="history-pills">
          <span class="pill pill-short ${sf?'':'incomplete'}">${log.short_count}/5 stones</span>
          <span class="pill pill-long ${lf?'':'incomplete'}">${lf?'Soul ✓':'Soul —'}</span>
        </div>
      </div>`;
    }).join('');
  }

  loadAll();
</script>
</body>
</html>
