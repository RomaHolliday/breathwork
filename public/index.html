<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Breathwork</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Karla:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1510;
    --surface: #121e17;
    --mist: #192618;
    --sage: #6b9e77;
    --dew: #a8c9b0;
    --stone: #7a9480;
    --moon: #eaefeb;
    --gold: #c9a85c;
    --gold-bright: #e8c478;
    --text: #c0d8c4;
    --text-dim: #4a6652;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px 80px;
    overflow-x: hidden;
    position: relative;
  }

  /* Rich layered background */
  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 70% at 15% 100%, rgba(40,90,55,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 80% 50% at 85% 0%, rgba(80,130,90,0.1) 0%, transparent 50%),
      radial-gradient(ellipse 60% 60% at 50% 40%, rgba(25,60,35,0.12) 0%, transparent 70%);
  }

  /* Animated aurora bands */
  .aurora {
    position: absolute;
    width: 200%;
    height: 300px;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.06;
    animation: aurora-drift ease-in-out infinite;
  }

  .aurora-1 {
    background: radial-gradient(ellipse, #4a9e60 0%, transparent 70%);
    top: 10%;
    left: -50%;
    animation-duration: 25s;
    animation-delay: 0s;
  }

  .aurora-2 {
    background: radial-gradient(ellipse, #c9a85c 0%, transparent 70%);
    top: 30%;
    left: -20%;
    height: 200px;
    opacity: 0.04;
    animation-duration: 32s;
    animation-delay: -10s;
  }

  .aurora-3 {
    background: radial-gradient(ellipse, #3a7a50 0%, transparent 70%);
    top: 60%;
    left: -30%;
    animation-duration: 20s;
    animation-delay: -5s;
  }

  @keyframes aurora-drift {
    0% { transform: translateX(0) scaleY(1); }
    50% { transform: translateX(30%) scaleY(1.3); }
    100% { transform: translateX(0) scaleY(1); }
  }

  /* Floating mist orbs */
  .mist-particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(140,200,160,0.06) 0%, transparent 65%);
    animation: mist-drift linear infinite;
  }

  @keyframes mist-drift {
    0%   { transform: translateY(110vh) scale(0.8); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 0.6; }
    100% { transform: translateY(-15vh) scale(1.3); opacity: 0; }
  }

  /* Layout */
  .container {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
    padding-top: 56px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 64px;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 10vw, 4.5rem);
    letter-spacing: 0.14em;
    color: var(--moon);
    line-height: 1;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 0.68rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .date-display {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--stone);
    margin-top: 14px;
    letter-spacing: 0.04em;
  }

  .sync-status {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 8px;
    height: 16px;
    transition: color 0.4s;
  }
  .sync-status.saving { color: var(--sage); }
  .sync-status.error  { color: #c97a6b; }

  /* Section */
  .section { margin-bottom: 48px; }

  .section-label {
    font-size: 0.62rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 28px;
    text-align: center;
  }

  /* Short orbs — centered row */
  .orb-row {
    display: flex;
    gap: clamp(12px, 4vw, 24px);
    justify-content: center;
    flex-wrap: nowrap;
  }

  .orb {
    width: clamp(60px, 15vw, 88px);
    height: clamp(60px, 15vw, 88px);
    border-radius: 50%;
    border: 1.5px solid rgba(107,158,119,0.25);
    background: radial-gradient(circle at 35% 35%, rgba(30,50,35,0.9), rgba(18,30,23,0.95));
    cursor: pointer;
    position: relative;
    transition: border-color 0.3s ease, transform 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  .orb:active { transform: scale(0.93); }

  .orb-face {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .orb-inner {
    width: 36%;
    height: 36%;
    border-radius: 50%;
    background: rgba(107,158,119,0.1);
    border: 1px solid rgba(107,158,119,0.2);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
  }

  .orb.done {
    border-color: rgba(107,158,119,0.65);
    background: radial-gradient(circle at 35% 35%, rgba(40,75,50,0.95), rgba(20,38,28,0.98));
  }

  .orb.done .orb-inner {
    background: radial-gradient(circle at 30% 30%, #7db888, #3a6b45);
    border-color: var(--sage);
    box-shadow: 0 0 16px rgba(107,158,119,0.5), 0 0 40px rgba(107,158,119,0.2);
    width: 52%;
    height: 52%;
  }

  .orb.done::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(107,158,119,0.18);
    animation: pulse-ring 2.8s ease infinite;
  }

  @keyframes pulse-ring {
    0%   { transform: scale(0.88); opacity: 0.9; }
    50%  { transform: scale(1.08); opacity: 0.2; }
    100% { transform: scale(0.88); opacity: 0.9; }
  }

  /* Burst */
  .burst {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
  }

  .burst::before, .burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.5);
  }

  .orb.bursting .burst::before {
    background: radial-gradient(circle, rgba(168,210,176,0.5) 0%, transparent 65%);
    animation: burst-1 0.7s ease-out forwards;
  }

  .orb.bursting .burst::after {
    background: radial-gradient(circle, rgba(107,158,119,0.3) 0%, transparent 70%);
    animation: burst-2 0.9s ease-out 0.05s forwards;
  }

  @keyframes burst-1 {
    0%   { transform: scale(0.5); opacity: 0.9; }
    100% { transform: scale(3); opacity: 0; }
  }

  @keyframes burst-2 {
    0%   { transform: scale(0.5); opacity: 0.7; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* Long orb */
  .long-breath-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .long-orb {
    width: clamp(150px, 40vw, 200px);
    height: clamp(150px, 40vw, 200px);
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,92,0.25);
    background: radial-gradient(circle at 35% 35%, rgba(45,38,20,0.95), rgba(18,15,8,0.98));
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    transition: border-color 0.5s ease, transform 0.15s ease;
    touch-action: manipulation;
  }

  .long-orb:active { transform: scale(0.95); }

  .long-orb-face {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .long-orb-inner {
    width: 38%;
    height: 38%;
    border-radius: 50%;
    background: rgba(201,168,92,0.07);
    border: 1px solid rgba(201,168,92,0.18);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .long-orb-inner svg {
    width: 40%;
    height: 40%;
    opacity: 0.35;
    transition: opacity 0.5s;
    color: var(--gold);
  }

  .long-orb.done {
    border-color: rgba(201,168,92,0.65);
    background: radial-gradient(circle at 35% 35%, rgba(60,48,20,0.98), rgba(25,18,5,0.99));
  }

  .long-orb.done .long-orb-inner {
    background: radial-gradient(circle at 30% 30%, #e8c878, #9a7030);
    border-color: var(--gold-bright);
    box-shadow: 0 0 28px rgba(201,168,92,0.6), 0 0 70px rgba(201,168,92,0.25);
    width: 55%;
    height: 55%;
  }

  .long-orb.done .long-orb-inner svg { opacity: 1; color: #fff8e0; }

  .long-orb.done::after {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,92,0.2);
    animation: pulse-ring-gold 3.2s ease infinite;
  }

  @keyframes pulse-ring-gold {
    0%   { transform: scale(0.9); opacity: 0.9; }
    50%  { transform: scale(1.06); opacity: 0.15; }
    100% { transform: scale(0.9); opacity: 0.9; }
  }

  .long-orb .burst::before {
    background: radial-gradient(circle, rgba(240,208,128,0.5) 0%, transparent 65%);
  }

  .long-orb .burst::after {
    background: radial-gradient(circle, rgba(201,168,92,0.3) 0%, transparent 70%);
  }

  .long-orb.bursting .burst::before {
    animation: burst-1 0.9s ease-out forwards;
  }

  .long-orb.bursting .burst::after {
    animation: burst-2 1.1s ease-out 0.06s forwards;
  }

  .long-label { text-align: center; }

  .long-label .duration {
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(201,168,92,0.55);
  }

  .long-label .name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: rgba(201,168,92,0.75);
    margin-top: 4px;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(107,158,119,0.12), transparent);
    margin: 12px 0 40px;
  }

  /* Summary */
  .summary {
    text-align: center;
    padding: 24px 20px;
    background: rgba(20,35,25,0.5);
    border: 1px solid rgba(107,158,119,0.1);
    border-radius: 6px;
    backdrop-filter: blur(8px);
  }

  .summary-line {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--stone);
    line-height: 1.9;
  }

  .summary-line span { color: var(--dew); font-style: normal; }

  .complete-msg {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--moon);
    margin-top: 10px;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .complete-msg.show { opacity: 1; }

  /* Undo */
  .undo-btn {
    background: none;
    border: 1px solid rgba(107,158,119,0.18);
    color: var(--text-dim);
    font-family: 'Karla', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    margin-top: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    touch-action: manipulation;
  }

  .undo-btn:active { opacity: 0.7; }

  .reset-note {
    text-align: center;
    margin-top: 14px;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.6;
  }

  /* History */
  .history-section {
    margin-top: 56px;
    border-top: 1px solid rgba(107,158,119,0.08);
    padding-top: 36px;
  }

  .history-title {
    font-size: 0.62rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
    text-align: center;
  }

  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 0;
    border-bottom: 1px solid rgba(107,158,119,0.06);
  }

  .history-row:last-child { border-bottom: none; }

  .history-date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--stone);
  }

  .history-pills { display: flex; gap: 8px; align-items: center; }

  .pill {
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
  }

  .pill-short {
    background: rgba(107,158,119,0.14);
    color: var(--sage);
    border: 1px solid rgba(107,158,119,0.22);
  }

  .pill-short.incomplete {
    background: rgba(107,158,119,0.04);
    color: var(--text-dim);
    border-color: rgba(107,158,119,0.08);
  }

  .pill-long {
    background: rgba(201,168,92,0.12);
    color: var(--gold);
    border: 1px solid rgba(201,168,92,0.22);
  }

  .pill-long.incomplete {
    background: rgba(201,168,92,0.03);
    color: var(--text-dim);
    border-color: rgba(201,168,92,0.08);
  }

  .history-empty {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--text-dim);
    text-align: center;
    padding: 24px 0;
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>
  <div class="aurora aurora-3"></div>
  <div id="mist-layer"></div>
</div>

<div class="container">
  <header>
    <div class="title">Breathwork</div>
    <div class="subtitle">Daily practice</div>
    <div class="date-display" id="date-display"></div>
    <div class="sync-status" id="sync-status"></div>
  </header>

  <!-- Short breaths -->
  <div class="section">
    <div class="section-label">2-minute breaths &mdash; <span id="short-count">0</span> of 5</div>
    <div class="orb-row" id="short-orbs"></div>
  </div>

  <div class="divider"></div>

  <!-- Long breath -->
  <div class="section">
    <div class="section-label">Extended breath</div>
    <div class="long-breath-wrap">
      <div class="long-orb" id="long-orb" onclick="clickLong()">
        <div class="burst"></div>
        <div class="long-orb-face">
          <div class="long-orb-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
              <path d="M12 2C12 2 4 8 4 13a8 8 0 0 0 16 0c0-5-8-11-8-11z"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="long-label">
        <div class="duration">10 minutes</div>
        <div class="name">Deep stillness</div>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-line">
      <span id="short-done">0</span> of 5 short &nbsp;&bull;&nbsp; long breath <span id="long-status">remaining</span>
    </div>
    <div class="complete-msg" id="complete-msg">Today's practice is complete ✦</div>
  </div>

  <button class="undo-btn" onclick="undoLast()">undo last</button>
  <div class="reset-note">Resets at midnight</div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">Past days</div>
    <div id="history-list"><div class="history-empty">Loading…</div></div>
  </div>
</div>

<script>
  // Mist particles
  const mistLayer = document.getElementById('mist-layer');
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'mist-particle';
    const size = 200 + Math.random() * 300;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*110-5}vw;animation-duration:${22+Math.random()*25}s;animation-delay:${-Math.random()*30}s`;
    mistLayer.appendChild(p);
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  let state = { short_count: 0, long_done: false };

  function setSyncStatus(msg, cls = '') {
    const el = document.getElementById('sync-status');
    el.textContent = msg;
    el.className = 'sync-status ' + cls;
  }

  async function loadAll() {
    try {
      const res = await fetch('/api/logs');
      const logs = await res.json();
      const today = todayStr();
      const todayLog = logs.find(l => l.date === today);
      if (todayLog) { state.short_count = todayLog.short_count; state.long_done = todayLog.long_done; }
      buildOrbs(); updateUI();
      renderHistory(logs.filter(l => l.date !== today));
    } catch(e) {
      setSyncStatus('offline — changes may not save', 'error');
      buildOrbs(); updateUI(); renderHistory([]);
    }
  }

  async function saveState() {
    setSyncStatus('saving…', 'saving');
    try {
      await fetch('/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: todayStr(), ...state })
      });
      setSyncStatus('saved', 'saving');
      setTimeout(() => setSyncStatus(''), 1800);
    } catch(e) { setSyncStatus('save failed', 'error'); }
  }

  function buildOrbs() {
    const container = document.getElementById('short-orbs');
    container.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const orb = document.createElement('div');
      orb.className = 'orb' + (i < state.short_count ? ' done' : '');
      orb.id = `orb-${i}`;
      orb.innerHTML = `<div class="burst"></div><div class="orb-face"><div class="orb-inner"></div></div>`;
      orb.onclick = () => clickShort(i);
      container.appendChild(orb);
    }
  }

  function clickShort(i) {
    if (i !== state.short_count) return;
    state.short_count++;
    saveState();
    const orb = document.getElementById(`orb-${i}`);
    orb.classList.add('bursting');
    setTimeout(() => { orb.classList.remove('bursting'); orb.classList.add('done'); }, 700);
    updateUI();
  }

  function clickLong() {
    if (state.long_done) return;
    state.long_done = true;
    saveState();
    const orb = document.getElementById('long-orb');
    orb.classList.add('bursting');
    setTimeout(() => { orb.classList.remove('bursting'); orb.classList.add('done'); }, 900);
    updateUI();
  }

  function undoLast() {
    if (state.long_done) { state.long_done = false; }
    else if (state.short_count > 0) { state.short_count--; }
    saveState(); buildOrbs(); updateUI();
  }

  function updateUI() {
    document.getElementById('short-count').textContent = state.short_count;
    document.getElementById('short-done').textContent = state.short_count;
    document.getElementById('long-status').textContent = state.long_done ? 'complete' : 'remaining';
    document.getElementById('complete-msg').classList.toggle('show', state.short_count >= 5 && state.long_done);
    document.getElementById('long-orb').classList.toggle('done', state.long_done);
  }

  function renderHistory(logs) {
    const list = document.getElementById('history-list');
    if (!logs || logs.length === 0) {
      list.innerHTML = '<div class="history-empty">No past sessions yet</div>';
      return;
    }
    list.innerHTML = logs.map(log => {
      const d = new Date(log.date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const shortFull = log.short_count >= 5;
      const longFull = log.long_done;
      return `<div class="history-row">
        <div class="history-date">${label}</div>
        <div class="history-pills">
          <span class="pill pill-short ${shortFull?'':'incomplete'}">${log.short_count}/5 short</span>
          <span class="pill pill-long ${longFull?'':'incomplete'}">${longFull?'10 min ✓':'10 min —'}</span>
        </div>
      </div>`;
    }).join('');
  }

  loadAll();
</script>
</body>
</html>
