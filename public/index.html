<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>The Gauntlet</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;600&family=Karla:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --panel: #141414;
    --panel-border: #2a2a2a;
    --ink: #111;
    --cream: #f5f0e8;
    --halftone: rgba(0,0,0,0.06);

    /* Canon stone colors */
    --space:   #1a4aff;   /* Space Stone - blue */
    --mind:    #f5c800;   /* Mind Stone - yellow */
    --reality: #cc1a1a;   /* Reality Stone - red */
    --power:   #9b30d4;   /* Power Stone - purple */
    --time:    #18a050;   /* Time Stone - green */
    --soul:    #e86010;   /* Soul Stone - orange */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  body {
    background: #0a0a0a;
    color: var(--cream);
    font-family: 'Karla', sans-serif;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    position: fixed;
    width: 100%;
    touch-action: none;
    overscroll-behavior: none;
  }

  /* ===== HALFTONE TEXTURE ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== COMIC PAGE LAYOUT ===== */
  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    height: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== MASTHEAD ===== */
  .masthead {
    background: #cc1a1a;
    border: none;
    border-bottom: 3px solid #111;
    padding: calc(env(safe-area-inset-top, 0px) + 10px) 20px 10px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(0,0,0,0.08) 4px,
      rgba(0,0,0,0.08) 8px
    );
  }

  .masthead-inner {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .comic-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.6rem, 10vw, 3.4rem);
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 0.88;
    text-shadow: 3px 3px 0 #800, 5px 5px 0 #111;
  }

  .masthead-meta {
    text-align: right;
  }

  .issue-num {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    color: #f5c800;
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 #111;
  }

  .masthead-date {
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ===== COMIC PANELS ===== */
  .panel {
    border: none;
    border-top: 2px solid #1a1a1a;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .panel:first-child { border-top: none; }

  .panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 5px 5px;
    pointer-events: none;
  }

  .panel-caption {
    background: #f5c800;
    color: #111;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-bottom: 2px solid #111;
    display: inline-block;
  }

  .panel-caption.red {
    background: #cc1a1a;
    color: #fff;
  }

  /* ===== STONES PANEL ===== */
  .stones-panel {
    padding: 0;
  }

  .stones-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px 0 0;
    border-bottom: 2px solid #111;
  }

  .stones-count {
    font-family: 'Bangers', cursive;
    font-size: 1.2rem;
    color: #f5c800;
    letter-spacing: 0.08em;
    padding: 5px 14px;
    background: #111;
  }

  .stones-grid {
    display: flex;
    gap: 0;
    justify-content: space-around;
    padding: 14px 8px 12px;
    background: radial-gradient(ellipse at 50% 100%, rgba(30,20,60,0.8) 0%, #141414 70%);
  }

  /* ===== GEM SHAPE ===== */
  .stone-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    flex: 1;
  }

  .stone {
    width: clamp(58px, 16vw, 76px);
    height: clamp(58px, 16vw, 76px);
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.1s ease;
  }

  .stone:active { transform: scale(0.82); }

  /* SVG gem */
  .stone svg.gem-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 0px transparent);
    transition: filter 0.4s ease;
  }

  /* Inactive crystal faces */
  .gem-top    { fill: rgba(255,255,255,0.06); }
  .gem-left   { fill: rgba(0,0,0,0.3); }
  .gem-right  { fill: rgba(0,0,0,0.5); }
  .gem-bottom { fill: rgba(0,0,0,0.6); }
  .gem-outline { fill: none; stroke: #333; stroke-width: 1.5; }

  /* Crystal chunk faces — inactive */
  .crystal-face-a  { fill: rgba(255,255,255,0.04); }
  .crystal-face-b  { fill: rgba(0,0,0,0.25); }
  .crystal-face-c  { fill: rgba(0,0,0,0.18); }
  .crystal-face-d  { fill: rgba(0,0,0,0.3); }
  .crystal-shine   { fill: rgba(255,255,255,0.06); }
  .crystal-shine2  { fill: rgba(255,255,255,0.03); }
  .crystal-outline { fill: none; stroke: #2a2a2a; stroke-width: 1.5; stroke-linejoin: round; }
  .crystal-core    { stop-color: #1a1a1a; }
  .crystal-mid     { stop-color: #111; }
  .crystal-edge    { stop-color: #0a0a0a; }

  /* Active crystal stones — inner glow via gradient stops + face tints */
  .stone.done[data-color="space"] svg.gem-svg   { filter: drop-shadow(0 0 10px #1a4aff) drop-shadow(0 0 28px rgba(26,74,255,0.55)); }
  .stone.done[data-color="mind"] svg.gem-svg    { filter: drop-shadow(0 0 10px #f5c800) drop-shadow(0 0 28px rgba(245,200,0,0.55)); }
  .stone.done[data-color="reality"] svg.gem-svg { filter: drop-shadow(0 0 10px #cc1a1a) drop-shadow(0 0 28px rgba(204,26,26,0.55)); }
  .stone.done[data-color="power"] svg.gem-svg   { filter: drop-shadow(0 0 10px #9b30d4) drop-shadow(0 0 28px rgba(155,48,212,0.55)); }
  .stone.done[data-color="time"] svg.gem-svg    { filter: drop-shadow(0 0 10px #18a050) drop-shadow(0 0 28px rgba(24,160,80,0.55)); }

  .stone.done[data-color="space"]   .crystal-core  { stop-color: #6688ff; }
  .stone.done[data-color="space"]   .crystal-mid   { stop-color: #1a3acc; }
  .stone.done[data-color="space"]   .crystal-edge  { stop-color: #060e55; }
  .stone.done[data-color="space"]   .crystal-face-a { fill: rgba(120,160,255,0.25); }
  .stone.done[data-color="space"]   .crystal-face-b { fill: rgba(10,30,120,0.5); }
  .stone.done[data-color="space"]   .crystal-face-c { fill: rgba(20,50,160,0.35); }
  .stone.done[data-color="space"]   .crystal-face-d { fill: rgba(6,14,80,0.6); }
  .stone.done[data-color="space"]   .crystal-shine  { fill: rgba(180,210,255,0.35); }
  .stone.done[data-color="space"]   .crystal-shine2 { fill: rgba(200,220,255,0.2); }
  .stone.done[data-color="space"]   .crystal-outline { stroke: rgba(80,130,255,0.4); }

  .stone.done[data-color="mind"]    .crystal-core  { stop-color: #ffe555; }
  .stone.done[data-color="mind"]    .crystal-mid   { stop-color: #c89000; }
  .stone.done[data-color="mind"]    .crystal-edge  { stop-color: #553f00; }
  .stone.done[data-color="mind"]    .crystal-face-a { fill: rgba(255,230,80,0.25); }
  .stone.done[data-color="mind"]    .crystal-face-b { fill: rgba(120,80,0,0.5); }
  .stone.done[data-color="mind"]    .crystal-face-c { fill: rgba(160,110,0,0.35); }
  .stone.done[data-color="mind"]    .crystal-face-d { fill: rgba(60,40,0,0.6); }
  .stone.done[data-color="mind"]    .crystal-shine  { fill: rgba(255,250,180,0.4); }
  .stone.done[data-color="mind"]    .crystal-shine2 { fill: rgba(255,245,200,0.22); }
  .stone.done[data-color="mind"]    .crystal-outline { stroke: rgba(220,170,0,0.4); }

  .stone.done[data-color="reality"] .crystal-core  { stop-color: #ff5555; }
  .stone.done[data-color="reality"] .crystal-mid   { stop-color: #aa1010; }
  .stone.done[data-color="reality"] .crystal-edge  { stop-color: #440404; }
  .stone.done[data-color="reality"] .crystal-face-a { fill: rgba(255,100,100,0.25); }
  .stone.done[data-color="reality"] .crystal-face-b { fill: rgba(100,10,10,0.5); }
  .stone.done[data-color="reality"] .crystal-face-c { fill: rgba(140,20,20,0.35); }
  .stone.done[data-color="reality"] .crystal-face-d { fill: rgba(50,4,4,0.6); }
  .stone.done[data-color="reality"] .crystal-shine  { fill: rgba(255,180,180,0.32); }
  .stone.done[data-color="reality"] .crystal-shine2 { fill: rgba(255,200,200,0.18); }
  .stone.done[data-color="reality"] .crystal-outline { stroke: rgba(200,40,40,0.4); }

  .stone.done[data-color="power"]   .crystal-core  { stop-color: #cc66ff; }
  .stone.done[data-color="power"]   .crystal-mid   { stop-color: #7010b0; }
  .stone.done[data-color="power"]   .crystal-edge  { stop-color: #2e0844; }
  .stone.done[data-color="power"]   .crystal-face-a { fill: rgba(180,80,255,0.25); }
  .stone.done[data-color="power"]   .crystal-face-b { fill: rgba(70,10,120,0.5); }
  .stone.done[data-color="power"]   .crystal-face-c { fill: rgba(100,20,150,0.35); }
  .stone.done[data-color="power"]   .crystal-face-d { fill: rgba(30,8,55,0.6); }
  .stone.done[data-color="power"]   .crystal-shine  { fill: rgba(210,160,255,0.32); }
  .stone.done[data-color="power"]   .crystal-shine2 { fill: rgba(220,180,255,0.18); }
  .stone.done[data-color="power"]   .crystal-outline { stroke: rgba(150,50,220,0.4); }

  .stone.done[data-color="time"]    .crystal-core  { stop-color: #44e077; }
  .stone.done[data-color="time"]    .crystal-mid   { stop-color: #108838; }
  .stone.done[data-color="time"]    .crystal-edge  { stop-color: #043314; }
  .stone.done[data-color="time"]    .crystal-face-a { fill: rgba(80,220,120,0.25); }
  .stone.done[data-color="time"]    .crystal-face-b { fill: rgba(8,80,30,0.5); }
  .stone.done[data-color="time"]    .crystal-face-c { fill: rgba(16,110,45,0.35); }
  .stone.done[data-color="time"]    .crystal-face-d { fill: rgba(4,40,15,0.6); }
  .stone.done[data-color="time"]    .crystal-shine  { fill: rgba(160,255,200,0.32); }
  .stone.done[data-color="time"]    .crystal-shine2 { fill: rgba(180,255,210,0.18); }
  .stone.done[data-color="time"]    .crystal-outline { stroke: rgba(30,160,80,0.4); }

  .stone.done .gem-outline { stroke: rgba(255,255,255,0.3); }

  /* No persistent pulse border — glow only */

  /* Burst */
  .stone-burst {
    position: absolute;
    inset: -24px;
    pointer-events: none;
    z-index: 20;
  }

  .stone-burst::before, .stone-burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.2);
  }

  .stone.bursting[data-color="space"]   .stone-burst::before { background: radial-gradient(circle, rgba(74,122,255,0.8) 0%, transparent 65%); animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="mind"]    .stone-burst::before { background: radial-gradient(circle, rgba(255,224,64,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="reality"] .stone-burst::before { background: radial-gradient(circle, rgba(232,64,64,0.8) 0%, transparent 65%);   animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="power"]   .stone-burst::before { background: radial-gradient(circle, rgba(192,96,240,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="time"]    .stone-burst::before { background: radial-gradient(circle, rgba(64,208,112,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }

  .stone.bursting .stone-burst::after {
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
    animation: gem-burst2 0.8s ease-out 0.04s forwards;
  }

  @keyframes gem-burst  { 0% { transform: scale(0.2); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
  @keyframes gem-burst2 { 0% { transform: scale(0.2); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

  @keyframes gauntlet-flash {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    50%  { opacity: 0.7; }
    100% { opacity: 0; }
  }

  /* Space — warp ripple */
  @keyframes space-warp {
    0%   { transform: scale(0.2); opacity: 0; }
    30%  { opacity: 1; }
    100% { transform: scale(2.8); opacity: 0; }
  }
  @keyframes page-warp {
    0%   { transform: scale(1); filter: none; }
    20%  { transform: scale(1.012); filter: hue-rotate(20deg) brightness(1.08); }
    60%  { transform: scale(0.994); filter: hue-rotate(-10deg); }
    100% { transform: scale(1); filter: none; }
  }

  /* Mind — invert flash */
  @keyframes mind-invert {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes mind-body {
    0%   { filter: none; }
    12%  { filter: invert(0.9) brightness(1.4) saturate(2); }
    35%  { filter: invert(0.3) brightness(1.1); }
    100% { filter: none; }
  }

  /* Reality — crack fade */
  @keyframes reality-crack {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    70%  { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* Power — shockwave ring */
  @keyframes power-ring {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(18); opacity: 0; }
  }
  @keyframes power-shake {
    0%   { transform: translateX(0); }
    10%  { transform: translateX(-8px) rotate(-0.5deg); }
    25%  { transform: translateX(7px) rotate(0.5deg); }
    40%  { transform: translateX(-5px); }
    55%  { transform: translateX(4px); }
    70%  { transform: translateX(-2px); }
    100% { transform: translateX(0); }
  }
  @keyframes quick-flash {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Time — sepia slowdown */
  @keyframes time-sepia {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes time-body {
    0%   { filter: none; }
    10%  { filter: sepia(0.85) saturate(0.4) brightness(0.88); }
    60%  { filter: sepia(0.3) saturate(0.8); }
    100% { filter: none; }
  }

  .stone-name {
    font-family: 'Oswald', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #444;
    text-align: center;
    transition: color 0.4s;
  }

  .stone.done[data-color="space"]   .stone-name { color: #4a7aff; }
  .stone.done[data-color="mind"]    .stone-name { color: #f5c800; }
  .stone.done[data-color="reality"] .stone-name { color: #e84040; }
  .stone.done[data-color="power"]   .stone-name { color: #c060f0; }
  .stone.done[data-color="time"]    .stone-name { color: #40d070; }

  /* ===== SOUL STONE PANEL ===== */
  .soul-panel {
    border-top: 0;
    padding: 0;
  }

  .soul-panel-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 16px 10px;
    background: radial-gradient(ellipse at 50% 60%, rgba(80,30,0,0.5) 0%, #141414 70%);
    gap: 10px;
    flex: 1;
    justify-content: center;
  }

  .soul-stone {
    width: clamp(100px, 30vw, 150px);
    height: clamp(100px, 30vw, 150px);
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.12s ease;
  }

  .soul-stone:active { transform: scale(0.9); }

  .soul-stone svg.gem-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 0px transparent);
    transition: filter 0.5s ease;
  }

  .soul-stone.done svg.gem-svg {
    filter: drop-shadow(0 0 14px #e86010) drop-shadow(0 0 40px rgba(232,96,16,0.7)) drop-shadow(0 0 80px rgba(232,96,16,0.3));
  }

  /* Inactive soul crystal */
  .soul-face-a  { fill: rgba(255,255,255,0.04); }
  .soul-face-b  { fill: rgba(0,0,0,0.25); }
  .soul-face-c  { fill: rgba(0,0,0,0.18); }
  .soul-face-d  { fill: rgba(0,0,0,0.3); }
  .soul-shine   { fill: rgba(255,255,255,0.05); }
  .soul-shine2  { fill: rgba(255,255,255,0.03); }
  .soul-outline { fill: none; stroke: #2a2a2a; stroke-width: 2; stroke-linejoin: round; }
  .soul-core    { stop-color: #1a1a1a; }
  .soul-mid     { stop-color: #111; }
  .soul-edge    { stop-color: #0a0a0a; }

  /* Active soul crystal */
  .soul-stone.done .soul-core   { stop-color: #ff9a50; }
  .soul-stone.done .soul-mid    { stop-color: #c04010; }
  .soul-stone.done .soul-edge   { stop-color: #401404; }
  .soul-stone.done .soul-face-a { fill: rgba(255,160,80,0.25); }
  .soul-stone.done .soul-face-b { fill: rgba(120,40,8,0.5); }
  .soul-stone.done .soul-face-c { fill: rgba(160,55,12,0.35); }
  .soul-stone.done .soul-face-d { fill: rgba(55,14,4,0.6); }
  .soul-stone.done .soul-shine  { fill: rgba(255,210,160,0.35); }
  .soul-stone.done .soul-shine2 { fill: rgba(255,225,180,0.2); }
  .soul-stone.done .soul-outline { stroke: rgba(220,100,20,0.45); }

  .soul-burst {
    position: absolute;
    inset: -40px;
    pointer-events: none;
    z-index: 20;
  }

  .soul-burst::before, .soul-burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.2);
  }

  .soul-stone.bursting .soul-burst::before {
    background: radial-gradient(circle, rgba(255,144,64,0.8) 0%, transparent 65%);
    animation: gem-burst 0.9s ease-out forwards;
  }
  .soul-stone.bursting .soul-burst::after {
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    animation: gem-burst2 1.1s ease-out 0.06s forwards;
  }

  .soul-label {
    text-align: center;
  }

  .soul-label .soul-name {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    color: #e86010;
    letter-spacing: 0.1em;
    text-shadow: 2px 2px 0 #111;
  }

  .soul-label .soul-duration {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    color: #555;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ===== SPEECH BUBBLE SUMMARY ===== */
  .bubble-panel {
    border-top: 0;
  }

  .speech-bubble {
    margin: 10px 20px;
    background: var(--cream);
    color: #111;
    border: 2px solid #111;
    border-radius: 14px;
    padding: 10px 20px;
    position: relative;
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.5;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: #111;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: var(--cream);
  }

  .bubble-count { color: #cc1a1a; }
  .bubble-soul  { color: #e86010; }

  .complete-msg {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    color: #9b30d4;
    letter-spacing: 0.08em;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 1s ease;
    text-shadow: 1px 1px 0 #111;
  }

  /* ===== ACTION PANEL ===== */
  .action-panel {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: #0d0d0d;
    border-top: 1px solid #1a1a1a;

  }

  .undo-btn {
    background: #1a1a1a;

  }

  .reset-note {
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #2a2a2a;
  }

  /* ===== HISTORY PANEL ===== */
  .history-panel {
    border-top: 1px solid #1a1a1a;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom, 12px);
  }

  .history-body {
    padding: 2px 20px 4px;
  }

  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid #181818;
  }
  .history-row:last-child { border-bottom: none; }

  .history-date {
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    color: #555;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .history-pills { display: flex; gap: 8px; }

  .pill {
    font-family: 'Oswald', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .pill-short { background: rgba(26,74,255,0.15); color: #4a7aff; border: 1px solid rgba(26,74,255,0.2); }
  .pill-short.incomplete { background: transparent; color: #333; border-color: #222; }
  .pill-long  { background: rgba(232,96,16,0.15); color: #e86010; border: 1px solid rgba(232,96,16,0.2); }
  .pill-long.incomplete  { background: transparent; color: #333; border-color: #222; }

  .history-empty {
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    color: #333;
    text-align: center;
    padding: 20px 0;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ===== GAUNTLET STONES ===== */
  .gauntlet-stone {
    transition: filter 0.5s ease;
  }
  #slot-space.lit   { fill: url(#g-space);   stroke: rgba(100,150,255,0.8); filter: drop-shadow(0 0 6px #1a4aff); }
  #slot-mind.lit    { fill: url(#g-mind);    stroke: rgba(245,200,0,0.8);   filter: drop-shadow(0 0 6px #f5c800); }
  #slot-reality.lit { fill: url(#g-reality); stroke: rgba(255,80,80,0.8);   filter: drop-shadow(0 0 6px #cc1a1a); }
  #slot-power.lit   { fill: url(#g-power);   stroke: rgba(180,80,255,0.8);  filter: drop-shadow(0 0 6px #9b30d4); }
  #slot-time.lit    { fill: url(#g-time);    stroke: rgba(60,200,100,0.8);  filter: drop-shadow(0 0 6px #18a050); }
  #slot-soul.lit    { fill: url(#g-soul);    stroke: rgba(255,150,50,0.8);  filter: drop-shadow(0 0 10px #e86010); }

  /* Gauntlet glow when all stones active */
  #gauntlet-svg.complete {
    filter: drop-shadow(0 0 16px rgba(232,96,16,0.6)) drop-shadow(0 0 40px rgba(155,48,212,0.3));
  }

  .soul-label .soul-name {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    color: #444;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: center;
  }
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg, transparent 8deg, rgba(255,255,255,0.01) 8deg, rgba(255,255,255,0.01) 9deg);
    pointer-events: none;
  }

  /* ===== TIMER ===== */
  .timer-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1.5px solid rgba(0,0,0,0.12);
  }

  .timer-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    color: #666;
    text-transform: uppercase;
  }

  .timer-digits {
    font-family: 'Bangers', cursive;
    font-size: 3rem;
    letter-spacing: 0.1em;
    color: #f5c800;
    line-height: 1;
    text-shadow: 3px 3px 0 #111, 0 0 24px rgba(245,200,0,0.35);
    transition: color 0.3s;
  }

  .timer-digits.urgent {
    color: #cc1a1a;
    text-shadow: 3px 3px 0 #111, 0 0 24px rgba(204,26,26,0.5);
    animation: timer-pulse 0.8s ease-in-out infinite;
  }

  @keyframes timer-pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
  }

  .cancel-timer-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #444;
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;

    touch-action: manipulation;

<body>
<div class="page">

  <!-- MASTHEAD -->
  <div class="masthead">
    <div class="masthead-inner">
      <div class="comic-title">The<br>Gauntlet</div>

        <div class="issue-num" id="issue-num">#001</div>

  <!-- STONES PANEL -->

          <polygon class="soul-face-b" points="76,18 90,46 70,44"/>

      <div class="timer-display" id="timer-display" style="display:none;">

    </div>

  <!-- ACTION BAR -->

    <button class="undo-btn" onclick="undoLast()">↩ Undo last</button>

    <div class="history-body">
      <div id="history-list"><div class="history-empty">No past sessions yet</div></div>
    </div>

</div>

<script>
  const STONE_COLORS = ['space','mind','reality','power','time'];
  const STONE_NAMES  = ['Space','Mind','Reality','Power','Time'];

  // Unique gem cut per stone
  const GEM_SHAPES = {
    // Space: chunky irregular crystal, wider base
    space: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-space" cx="45%" cy="40%" r="55%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-space)" points="50,8 72,18 88,42 82,72 60,98 38,96 16,70 14,44 28,18"/>
      <polygon class="crystal-face-a" points="50,8 72,18 58,38"/>
      <polygon class="crystal-face-b" points="72,18 88,42 68,45"/>
      <polygon class="crystal-face-c" points="14,44 28,18 42,40"/>
      <polygon class="crystal-face-d" points="82,72 60,98 62,68"/>
      <polygon class="crystal-shine"  points="36,20 50,10 54,32 40,28"/>
      <polygon class="crystal-shine2" points="58,14 70,22 64,34"/>
      <polyline class="crystal-outline" points="50,8 72,18 88,42 82,72 60,98 38,96 16,70 14,44 28,18 50,8"/>
    </svg>`,
    // Mind: tall angular shard with notch
    mind: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-mind" cx="50%" cy="35%" r="55%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-mind)" points="50,6 76,20 84,50 74,80 56,100 44,100 26,80 18,48 26,20"/>
      <polygon class="crystal-face-a" points="50,6 76,20 60,32"/>
      <polygon class="crystal-face-b" points="76,20 84,50 66,44"/>
      <polygon class="crystal-face-c" points="18,48 26,20 42,36"/>
      <polygon class="crystal-face-d" points="56,100 74,80 68,70"/>
      <polygon class="crystal-shine"  points="34,22 50,8 52,30 38,26"/>
      <polygon class="crystal-shine2" points="60,12 74,24 66,36"/>
      <polyline class="crystal-outline" points="50,6 76,20 84,50 74,80 56,100 44,100 26,80 18,48 26,20 50,6"/>
    </svg>`,
    // Reality: leaning lopsided chunk
    reality: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-reality" cx="55%" cy="38%" r="52%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-reality)" points="54,6 80,16 90,44 86,76 62,100 36,98 14,72 12,42 30,16"/>
      <polygon class="crystal-face-a" points="54,6 80,16 64,30"/>
      <polygon class="crystal-face-b" points="80,16 90,44 72,40"/>
      <polygon class="crystal-face-c" points="12,42 30,16 44,38"/>
      <polygon class="crystal-face-d" points="86,76 62,100 64,72"/>
      <polygon class="crystal-shine"  points="38,18 56,8 58,30 42,26"/>
      <polygon class="crystal-shine2" points="64,10 78,20 70,32"/>
      <polyline class="crystal-outline" points="54,6 80,16 90,44 86,76 62,100 36,98 14,72 12,42 30,16 54,6"/>
    </svg>`,
    // Power: wide squat boulder shape
    power: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-power" cx="45%" cy="42%" r="52%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-power)" points="46,8 70,12 90,36 92,66 72,96 48,100 24,94 10,66 12,36 32,12"/>
      <polygon class="crystal-face-a" points="46,8 70,12 60,34"/>
      <polygon class="crystal-face-b" points="70,12 90,36 72,38"/>
      <polygon class="crystal-face-c" points="12,36 32,12 44,36"/>
      <polygon class="crystal-face-d" points="92,66 72,96 70,72"/>
      <polygon class="crystal-shine"  points="34,14 50,8 52,32 38,26"/>
      <polygon class="crystal-shine2" points="58,10 72,18 66,30"/>
      <polyline class="crystal-outline" points="46,8 70,12 90,36 92,66 72,96 48,100 24,94 10,66 12,36 32,12 46,8"/>
    </svg>`,
    // Time: tall thin spike
    time: `<svg class="gem-svg" viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="glow-time" cx="48%" cy="32%" r="52%">
          <stop offset="0%" class="crystal-core" stop-opacity="0.9"/>
          <stop offset="60%" class="crystal-mid" stop-opacity="0.6"/>
          <stop offset="100%" class="crystal-edge" stop-opacity="0.85"/>
        </radialGradient>
      </defs>
      <polygon fill="url(#glow-time)" points="50,4 68,16 78,44 74,78 58,102 42,102 26,78 24,44 34,16"/>
      <polygon class="crystal-face-a" points="50,4 68,16 56,30"/>
      <polygon class="crystal-face-b" points="68,16 78,44 62,40"/>
      <polygon class="crystal-face-c" points="24,44 34,16 46,34"/>
      <polygon class="crystal-face-d" points="74,78 58,102 56,76"/>
      <polygon class="crystal-shine"  points="36,18 50,6 52,28 38,22"/>
      <polygon class="crystal-shine2" points="56,8 68,18 62,28"/>
      <polyline class="crystal-outline" points="50,4 68,16 78,44 74,78 58,102 42,102 26,78 24,44 34,16 50,4"/>
    </svg>`
  };

  function gemSVG(color) {
    return GEM_SHAPES[color] || GEM_SHAPES.space;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();

  let state = { short_count: 0, long_done: false };

  function setSyncStatus(msg, cls) {}  // silent

  async function loadAll() {
    try {
      const res = await fetch('/api/logs');
      if (!res.ok) throw new Error();
      const logs = await res.json();
      const today = todayStr();
      const todayLog = logs.find(l => l.date === today);
      if (todayLog) {
        state.short_count  = todayLog.short_count  ?? 0;
        state.long_done    = todayLog.long_done    ?? false;
        state.issue_number = todayLog.issue_number ?? null;
      }
      // If no entry for today yet, create one to get an issue number assigned
      if (!todayLog) {
        const r = await fetch('/api/logs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: today, short_count: 0, long_done: false })
        });
        if (r.ok) {
          const created = await r.json();
          state.issue_number = created.issue_number;
        }
      }
      setIssueNum(state.issue_number);
      buildStones(); updateUI();
      renderHistory(logs.filter(l => l.date !== today));
    } catch(e) {
      setSyncStatus('offline', 'error');
      buildStones(); updateUI(); renderHistory([]);
    }
  }

  function setIssueNum(n) {
    if (!n) return;
    document.getElementById('issue-num').textContent = '#' + String(n).padStart(3, '0');
  }

  async function saveState() {
    setSyncStatus('saving…', 'saving');
    try {
      const res = await fetch('/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: todayStr(), short_count: state.short_count, long_done: state.long_done })
      });
      if (!res.ok) throw new Error();
      const saved = await res.json();
      if (saved.issue_number) setIssueNum(saved.issue_number);
      setSyncStatus('saved ✓', 'saving');
      setTimeout(() => setSyncStatus(''), 2000);
    } catch(e) { setSyncStatus('save failed', 'error'); }
  }

  function buildStones() {
    const container = document.getElementById('short-orbs');
    container.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'stone-wrap';

      const stone = document.createElement('div');
      stone.className = 'stone' + (i < state.short_count ? ' done' : '');
      stone.id = `stone-${i}`;
      stone.dataset.color = STONE_COLORS[i];
      stone.innerHTML = `<div class="stone-burst"></div>${gemSVG(STONE_COLORS[i])}`;
      stone.addEventListener('click', () => clickStone(i));
      stone.addEventListener('touchend', (e) => { e.preventDefault(); clickStone(i); });

      const label = document.createElement('div');
      label.className = 'stone-name';
      label.textContent = STONE_NAMES[i];

      wrap.appendChild(stone);
      wrap.appendChild(label);
      container.appendChild(wrap);
    }
  }

  function clickStone(i) {
    if (i !== state.short_count) return;
    state.short_count++;
    saveState();
    const stone = document.getElementById(`stone-${i}`);
    stone.classList.add('bursting');
    setTimeout(() => { stone.classList.remove('bursting'); stone.classList.add('done'); }, 650);
    updateUI();
    setTimeout(() => stoneEffect(STONE_COLORS[i]), 150);
    // Start/reset 90-min timer for Space, Mind, Reality, Power (indices 0-3)
    if (TIMER_STONES.has(i)) startTimer();
    // Stop timer after Power (index 3 starts it, Time=4 and Soul don't)
    // Timer auto-stops at 0 or when next stone is clicked
  }

  function stoneEffect(color) {
    if (color === 'space')   effectSpace();
    if (color === 'mind')    effectMind();
    if (color === 'reality') effectReality();
    if (color === 'power')   effectPower();
    if (color === 'time')    effectTime();
  }

  // ===== CANVAS ENGINE =====
  function makeCanvas() {
    const c = document.createElement('canvas');
    c.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;z-index:9998;pointer-events:none;';
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
    document.body.appendChild(c);
    return c;
  }

  function runCanvas(c, drawFn, duration) {
    const ctx = c.getContext('2d');
    const start = performance.now();
    function frame(now) {
      const t = Math.min((now - start) / duration, 1);
      ctx.clearRect(0, 0, c.width, c.height);
      drawFn(ctx, t, c.width, c.height);
      if (t < 1) requestAnimationFrame(frame);
      else c.remove();
    }
    requestAnimationFrame(frame);
  }

  // SPACE — stars shoot outward from center, blue portal ripples
  function effectSpace() {
    const c = makeCanvas();
    const W = c.width, H = c.height, cx = W/2, cy = H/2;
    const stars = Array.from({length: 80}, () => {
      const angle = Math.random() * Math.PI * 2;
      const speed = 300 + Math.random() * 700;
      return { angle, speed, size: 1 + Math.random() * 2.5, trail: 0.3 + Math.random() * 0.5 };
    });
    runCanvas(c, (ctx, t, W, H) => {
      // Ripple rings
      [0, 0.15, 0.3].forEach(offset => {
        const rt = Math.max(0, t - offset);
        if (rt <= 0) return;
        const r = rt * Math.max(W, H) * 0.85;
        const alpha = (1 - rt) * 0.5;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(74,122,255,${alpha})`;
        ctx.lineWidth = 3 - rt * 2;
        ctx.stroke();
      });
      // Stars
      stars.forEach(s => {
        const dist = t * s.speed;
        const x = cx + Math.cos(s.angle) * dist;
        const y = cy + Math.sin(s.angle) * dist;
        const trailDist = Math.max(0, dist - s.trail * s.speed);
        const tx = cx + Math.cos(s.angle) * trailDist;
        const ty = cy + Math.sin(s.angle) * trailDist;
        const alpha = t < 0.7 ? 1 : (1 - t) / 0.3;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(x, y);
        ctx.strokeStyle = `rgba(150,190,255,${alpha})`;
        ctx.lineWidth = s.size;
        ctx.stroke();
      });
      // Center portal
      const pr = (1 - Math.pow(t, 2)) * 80;
      const pg = ctx.createRadialGradient(cx, cy, 0, cx, cy, pr);
      pg.addColorStop(0, `rgba(150,190,255,${0.6*(1-t)})`);
      pg.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.arc(cx, cy, pr, 0, Math.PI*2);
      ctx.fillStyle = pg; ctx.fill();
    }, 1100);
  }

  // MIND — psychic shockwave + golden thought fragments
  function effectMind() {
    const c = makeCanvas();
    const W = c.width, H = c.height, cx = W/2, cy = H/2;
    // Invert flash overlay separately
    const inv = document.createElement('div');
    inv.style.cssText = 'position:fixed;inset:0;z-index:9997;pointer-events:none;background:#fff;';
    inv.style.mixBlendMode = 'difference';
    document.body.appendChild(inv);
    inv.animate([{opacity:0},{opacity:0.9},{opacity:0.5},{opacity:0}], {duration:500, fill:'forwards'})
       .onfinish = () => inv.remove();

    const fragments = Array.from({length: 40}, () => ({
      angle: Math.random() * Math.PI * 2,
      speed: 150 + Math.random() * 400,
      size:  4 + Math.random() * 10,
      rot:   Math.random() * Math.PI,
      rotSpeed: (Math.random() - 0.5) * 8,
    }));
    runCanvas(c, (ctx, t, W, H) => {
      // Ripple
      [0, 0.1].forEach(offset => {
        const rt = Math.max(0, t - offset);
        const r = rt * Math.max(W, H) * 0.9;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(245,200,0,${(1-rt)*0.6})`;
        ctx.lineWidth = 4*(1-rt)+1; ctx.stroke();
      });
      // Fragments (diamond shapes)
      fragments.forEach(f => {
        const dist = t * f.speed;
        const x = cx + Math.cos(f.angle) * dist;
        const y = cy + Math.sin(f.angle) * dist;
        const alpha = t < 0.6 ? 1 : (1-t)/0.4;
        const rot = f.rot + f.rotSpeed * t;
        ctx.save();
        ctx.translate(x, y); ctx.rotate(rot);
        ctx.beginPath();
        ctx.moveTo(0, -f.size); ctx.lineTo(f.size*0.6, 0);
        ctx.lineTo(0, f.size);  ctx.lineTo(-f.size*0.6, 0);
        ctx.closePath();
        ctx.fillStyle = `rgba(255,220,50,${alpha*0.9})`;
        ctx.strokeStyle = `rgba(255,255,150,${alpha})`;
        ctx.lineWidth = 1;
        ctx.fill(); ctx.stroke();
        ctx.restore();
      });
    }, 1000);
  }

  // REALITY — screen cracks, then red shards fly inward and dissolve
  function effectReality() {
    const c = makeCanvas();
    const W = c.width, H = c.height, cx = W/2, cy = H/2;
    // Crack lines drawn once, then fade
    const cracks = [
      [[cx,cy],[cx-120,cy-200],[cx-180,cy-380]],
      [[cx,cy],[cx+140,cy-180],[cx+200,cy-350]],
      [[cx,cy],[cx-160,cy+160],[cx-60,cy+380]],
      [[cx,cy],[cx+180,cy+140],[cx+100,cy+360]],
      [[cx,cy],[cx-W*0.45,cy+20]],
      [[cx,cy],[cx+W*0.45,cy-10]],
      [[cx,cy],[cx+20,cy-H*0.45]],
      [[cx,cy],[cx-10,cy+H*0.45]],
    ];
    // Flying shards
    const shards = Array.from({length: 30}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      vx: (cx - Math.random()*W) * 0.003,
      vy: (cy - Math.random()*H) * 0.003,
      size: 6 + Math.random()*18,
      rot: Math.random()*Math.PI*2,
      points: Math.floor(3 + Math.random()*2),
    }));
    runCanvas(c, (ctx, t, W, H) => {
      // Red wash
      ctx.fillStyle = `rgba(180,0,0,${0.12 * Math.sin(t * Math.PI)})`;
      ctx.fillRect(0, 0, W, H);
      // Cracks appear fast then hold
      const crackAlpha = t < 0.15 ? t/0.15 : t < 0.7 ? 1 : (1-t)/0.3;
      cracks.forEach((pts, i) => {
        const delay = i * 0.04;
        const ct = Math.max(0, Math.min(1, (t - delay) / 0.2));
        if (ct <= 0) return;
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let j = 1; j < pts.length; j++) {
          const px = pts[0][0] + (pts[j][0]-pts[0][0])*ct;
          const py = pts[0][1] + (pts[j][1]-pts[0][1])*ct;
          ctx.lineTo(px, py);
        }
        ctx.strokeStyle = `rgba(255,60,60,${crackAlpha})`;
        ctx.lineWidth = i < 4 ? 2.5 : 1.5;
        ctx.shadowColor = 'rgba(255,0,0,0.8)';
        ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;
      });
      // Shards fly in from edges then vanish
      if (t > 0.1) {
        shards.forEach(s => {
          const st = (t - 0.1) / 0.9;
          const x = s.x + s.vx * st * W;
          const y = s.y + s.vy * st * H;
          const alpha = st < 0.5 ? st*2 : (1-st)*2;
          ctx.save();
          ctx.translate(x, y); ctx.rotate(s.rot + st * 3);
          ctx.beginPath();
          for (let j = 0; j < s.points; j++) {
            const a = (j/s.points)*Math.PI*2;
            const r = s.size * (j%2===0 ? 1 : 0.5);
            j===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
                  : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
          }
          ctx.closePath();
          ctx.fillStyle = `rgba(200,20,20,${alpha*0.7})`;
          ctx.strokeStyle = `rgba(255,100,100,${alpha})`;
          ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
          ctx.restore();
        });
      }
    }, 1400);
  }

  // POWER — shockwave + massive particle explosion
  function effectPower() {
    const c = makeCanvas();
    const W = c.width, H = c.height, cx = W/2, cy = H/2;
    // Screen shake
    const page = document.querySelector('.page');
    const shakeFrames = [0,-10,8,-6,5,-3,2,-1,0];
    let sf = 0;
    const shakeInt = setInterval(() => {
      page.style.transform = `translateX(${shakeFrames[sf]||0}px)`;
      sf++;
      if (sf >= shakeFrames.length) { clearInterval(shakeInt); page.style.transform=''; }
    }, 40);

    const particles = Array.from({length: 120}, () => {
      const angle = Math.random() * Math.PI * 2;
      const speed = 200 + Math.random() * 900;
      return { angle, speed, size: 2 + Math.random() * 5, gravity: 300 + Math.random()*200 };
    });
    runCanvas(c, (ctx, t, W, H) => {
      // Shockwave rings
      [0, 0.08, 0.18].forEach(offset => {
        const rt = Math.max(0, t - offset);
        if (rt <= 0) return;
        const r = rt * Math.max(W,H) * 1.1;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(180,80,255,${(1-rt)*0.8})`;
        ctx.lineWidth = 6*(1-rt)+1; ctx.stroke();
      });
      // Flash
      if (t < 0.12) {
        ctx.fillStyle = `rgba(155,48,212,${(0.12-t)/0.12 * 0.4})`;
        ctx.fillRect(0,0,W,H);
      }
      // Particles
      particles.forEach(p => {
        const dist = t * p.speed;
        const gravDrop = 0.5 * p.gravity * t * t;
        const x = cx + Math.cos(p.angle)*dist;
        const y = cy + Math.sin(p.angle)*dist + gravDrop;
        const alpha = t < 0.4 ? 1 : (1-t)/0.6;
        ctx.beginPath();
        ctx.arc(x, y, p.size*(1-t*0.5), 0, Math.PI*2);
        ctx.fillStyle = `rgba(${180+Math.floor(t*50)},${60+Math.floor(t*40)},255,${alpha})`;
        ctx.fill();
      });
    }, 1200);
  }

  // TIME — freeze frame: particles stop mid-air, world goes green/sepia, then everything snaps back
  function effectTime() {
    const c = makeCanvas();
    const W = c.width, H = c.height, cx = W/2, cy = H/2;
    // Particles frozen mid-explosion at t=0.3 then drift back
    const particles = Array.from({length: 60}, () => ({
      angle: Math.random()*Math.PI*2,
      dist:  80 + Math.random()*200,
      size:  2 + Math.random()*4,
      drift: (Math.random()-0.5)*30,
    }));
    // Sepia overlay
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9997;pointer-events:none;';
    document.body.appendChild(overlay);
    overlay.animate([
      {filter:'sepia(0) saturate(1) brightness(1)', opacity:0},
      {filter:'sepia(0.9) saturate(0.3) brightness(0.85)', opacity:1},
      {filter:'sepia(0.9) saturate(0.3) brightness(0.85)', opacity:1},
      {filter:'sepia(0) saturate(1) brightness(1)', opacity:0},
    ], {duration:1600, fill:'forwards'}).onfinish = () => overlay.remove();

    // Clock tick sound-like flashes
    runCanvas(c, (ctx, t, W, H) => {
      // Frozen particles
      const frozen = t < 0.35;
      particles.forEach(p => {
        const progress = frozen ? 0.35 : 0.35 + (t-0.35)*0.8;
        const x = cx + Math.cos(p.angle)*p.dist*progress + p.drift*Math.max(0,t-0.35);
        const y = cy + Math.sin(p.angle)*p.dist*progress;
        const alpha = t < 0.9 ? 0.9 : (1-t)/0.1;
        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(60,200,120,${alpha * (frozen ? 1 : 0.6)})`;
        ctx.fill();
        // Frozen: add glow ring
        if (frozen) {
          ctx.beginPath(); ctx.arc(x, y, p.size+2, 0, Math.PI*2);
          ctx.strokeStyle = `rgba(100,255,160,${alpha*0.5})`;
          ctx.lineWidth = 1; ctx.stroke();
        }
      });
      // Clock ring
      const r = 40 + t*60;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(24,160,80,${Math.max(0,(0.4-t)/0.4)*0.8})`;
      ctx.lineWidth = 2; ctx.stroke();
      // Tick marks when frozen
      if (frozen) {
        for (let i=0; i<12; i++) {
          const a = (i/12)*Math.PI*2;
          ctx.beginPath();
          ctx.moveTo(cx+Math.cos(a)*(r-6), cy+Math.sin(a)*(r-6));
          ctx.lineTo(cx+Math.cos(a)*(r+2), cy+Math.sin(a)*(r+2));
          ctx.strokeStyle = `rgba(60,220,100,0.8)`;
          ctx.lineWidth = 1.5; ctx.stroke();
        }
      }
    }, 1800);
  }

  function clickLong() {
    if (state.long_done) return;
    if (state.short_count < 5) return; // must complete all 5 first
    state.long_done = true;
    saveState();
    const orb = document.getElementById('long-orb');
    orb.classList.add('bursting');
    setTimeout(() => { orb.classList.remove('bursting'); orb.classList.add('done'); }, 950);
    updateUI();
    setTimeout(() => gauntletFlash(), 300);
  }

  function gauntletFlash() {
    const c = makeCanvas();
    c.style.zIndex = 9999;
    const W = c.width, H = c.height, cx = W/2, cy = H/2;
    // All 6 stone colors explode outward
    const colors = ['26,74,255','245,200,0','204,26,26','155,48,212','24,160,80','232,96,16'];
    const particles = Array.from({length: 200}, (_, i) => ({
      angle:  Math.random()*Math.PI*2,
      speed:  300 + Math.random()*1200,
      size:   3 + Math.random()*7,
      color:  colors[i % colors.length],
      gravity: 200 + Math.random()*400,
      delay:  Math.random()*0.15,
    }));
    // Shockwave rings for each stone color
    runCanvas(c, (ctx, t, W, H) => {
      // White core flash
      if (t < 0.08) {
        ctx.fillStyle = `rgba(255,255,255,${(0.08-t)/0.08})`;
        ctx.fillRect(0,0,W,H);
      }
      // Orange bloom
      const bloom = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.8);
      bloom.addColorStop(0, `rgba(255,180,50,${Math.max(0,(0.3-t)/0.3)*0.6})`);
      bloom.addColorStop(1, 'transparent');
      ctx.fillStyle = bloom; ctx.fillRect(0,0,W,H);
      // Expanding rings
      colors.forEach((col, i) => {
        const rt = Math.max(0, t - i*0.04);
        const r = rt * Math.max(W,H) * 0.9;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${col},${(1-rt)*0.7})`;
        ctx.lineWidth = 3*(1-rt)+1; ctx.stroke();
      });
      // Particles
      particles.forEach(p => {
        const pt = Math.max(0, t - p.delay);
        if (pt <= 0) return;
        const dist = pt * p.speed;
        const x = cx + Math.cos(p.angle)*dist;
        const y = cy + Math.sin(p.angle)*dist + 0.5*p.gravity*pt*pt;
        const alpha = pt < 0.5 ? 1 : (1-pt)/0.5;
        ctx.beginPath();
        ctx.arc(x, y, p.size*(1-pt*0.4), 0, Math.PI*2);
        ctx.fillStyle = `rgba(${p.color},${alpha})`;
        ctx.fill();
      });
    }, 2000);
  }

  function undoLast() {
    if (state.long_done) { state.long_done = false; }
    else if (state.short_count > 0) { state.short_count--; }
    stopTimer();
    saveState(); buildStones(); updateUI();
  }

  // Next stone labels
  const NEXT_LABELS = [
    'Next: Mind Stone',
    'Next: Reality Stone',
    'Next: Power Stone',
    'Next: Time Stone',
    'Finally: Soul Stone',
    'collected!'
  ];

  function updateUI() {
    document.getElementById('short-count').textContent = state.short_count;
    document.getElementById('short-done').textContent  = state.short_count;

    // Next label
    const nextEl = document.getElementById('next-label');
    if (state.long_done) {
      nextEl.textContent = 'All stones collected!';
      nextEl.style.color = '#9b30d4';
    } else if (state.short_count === 0) {
      nextEl.textContent = 'Soul Stone remaining';
      nextEl.style.color = '';
    } else if (state.short_count >= 5) {
      nextEl.textContent = 'Finally: Soul Stone';
      nextEl.style.color = '#e86010';
    } else {
      nextEl.textContent = NEXT_LABELS[state.short_count - 1];
      nextEl.style.color = '';
    }

    document.getElementById('complete-msg').classList.toggle('show', state.short_count >= 5 && state.long_done);
    document.getElementById('long-orb').classList.toggle('done', state.long_done);
    updateGauntlet();
  }

  function updateGauntlet() {
    const stoneMap = ['space','mind','reality','power','time'];
    stoneMap.forEach((name, i) => {
      const el = document.getElementById('slot-' + name);
      if (el) el.classList.toggle('lit', i < state.short_count);
    });
    const soulEl = document.getElementById('slot-soul');
    if (soulEl) soulEl.classList.toggle('lit', state.long_done);
    const gauntlet = document.getElementById('gauntlet-svg');
    if (gauntlet) gauntlet.classList.toggle('complete', state.short_count >= 5 && state.long_done);
  }

  // ===== TIMER =====
  const TIMER_DURATION = 90 * 60; // 90 minutes in seconds
  const TIMER_STONES = new Set([0, 1, 2, 3]); // space, mind, reality, power (indices)
  let timerInterval = null;
  let timerSeconds = 0;

  function startTimer() {
    stopTimer();
    timerSeconds = TIMER_DURATION;
    document.getElementById('timer-display').style.display = 'flex';
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timerSeconds--;
      updateTimerDisplay();
      if (timerSeconds <= 0) {
        stopTimer();
        playAlarm();
        sendPushNotification();
      }
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('timer-display').style.display = 'none';
  }

  // ===== PUSH NOTIFICATIONS =====
  let pushSubscription = null;

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.register('/sw.js');
      const keyRes = await fetch('/api/vapid-public-key');
      const { key } = await keyRes.json();

      const existing = await reg.pushManager.getSubscription();
      if (existing) { pushSubscription = existing; return; }

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') return;

      pushSubscription = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(key),
      });

      await fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription: pushSubscription }),
      });
    } catch(e) { console.warn('Push setup failed:', e); }
  }

  async function sendPushNotification() {
    if (!pushSubscription) return;
    try {
      await fetch('/api/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ endpoint: pushSubscription.endpoint }),
      });
    } catch(e) { console.warn('Push notify failed:', e); }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw = atob(base64);
    return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
  }

  function updateTimerDisplay() {
    const h = Math.floor(timerSeconds / 3600);
    const m = Math.floor((timerSeconds % 3600) / 60);
    const s = timerSeconds % 60;
    const str = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const el = document.getElementById('timer-digits');
    el.textContent = str;
    el.classList.toggle('urgent', timerSeconds <= 300); // red + pulse under 5 min
  }

  // ===== ALARM — Web Audio API beep sequence =====
  function playAlarm() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const duration = 8; // seconds total
    const beepPattern = [0, 0.4, 0.8, 1.2, 1.6, 2.2, 2.8, 3.4, 4.0, 5.0, 6.0, 7.0];

    beepPattern.forEach(time => {
      if (time >= duration) return;
      // Main tone
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + time);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + time + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + time + 0.22);
      osc.start(ctx.currentTime + time);
      osc.stop(ctx.currentTime + time + 0.25);
      // Harmonic
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2); gain2.connect(ctx.destination);
      osc2.frequency.value = 1320;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(0, ctx.currentTime + time);
      gain2.gain.linearRampToValueAtTime(0.2, ctx.currentTime + time + 0.02);
      gain2.gain.linearRampToValueAtTime(0, ctx.currentTime + time + 0.22);
      osc2.start(ctx.currentTime + time);
      osc2.stop(ctx.currentTime + time + 0.25);
    });

    setTimeout(() => ctx.close(), (duration + 1) * 1000);
  }

  function renderHistory(logs) {
    const list = document.getElementById('history-list');
    if (!logs || logs.length === 0) {
      list.innerHTML = '<div class="history-empty">No past sessions yet</div>';
      return;
    }
    list.innerHTML = logs.map(log => {
      const d = new Date(log.date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
      const sf = log.short_count >= 5, lf = log.long_done;
      return `<div class="history-row">
        <div class="history-date">${label}</div>
        <div class="history-pills">
          <span class="pill pill-short ${sf?'':'incomplete'}">${log.short_count}/5 stones</span>
          <span class="pill pill-long ${lf?'':'incomplete'}">${lf?'Soul ✓':'Soul —'}</span>
        </div>
      </div>`;
    }).join('');
  }

  loadAll();
  initPush();

  // Prevent all scrolling/bouncing
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
</body>
