<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>The Gauntlet</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Oswald:wght@400;600&family=Karla:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --panel: #141414;
    --panel-border: #2a2a2a;
    --ink: #111;
    --cream: #f5f0e8;
    --halftone: rgba(0,0,0,0.06);

    /* Canon stone colors */
    --space:   #1a4aff;   /* Space Stone - blue */
    --mind:    #f5c800;   /* Mind Stone - yellow */
    --reality: #cc1a1a;   /* Reality Stone - red */
    --power:   #9b30d4;   /* Power Stone - purple */
    --time:    #18a050;   /* Time Stone - green */
    --soul:    #e86010;   /* Soul Stone - orange */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    background: #0a0a0a;
    color: var(--cream);
    font-family: 'Karla', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== HALFTONE TEXTURE ===== */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== COMIC PAGE LAYOUT ===== */
  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px 12px 60px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ===== MASTHEAD ===== */
  .masthead {
    background: #cc1a1a;
    border: 3px solid #111;
    padding: 10px 16px 8px;
    margin-bottom: 0;
    position: relative;
    overflow: hidden;
  }

  .masthead::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      rgba(0,0,0,0.08) 4px,
      rgba(0,0,0,0.08) 8px
    );
  }

  .masthead-inner {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .comic-title {
    font-family: 'Bangers', cursive;
    font-size: clamp(2.2rem, 9vw, 3.2rem);
    letter-spacing: 0.06em;
    color: #fff;
    line-height: 0.9;
    text-shadow: 3px 3px 0 #800, 5px 5px 0 #111;
  }

  .masthead-meta {
    text-align: right;
  }

  .issue-num {
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    color: #f5c800;
    letter-spacing: 0.1em;
    text-shadow: 1px 1px 0 #111;
  }

  .masthead-date {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .sync-status {
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    height: 16px;
    transition: color 0.3s;
  }
  .sync-status.saving { color: #f5c800; font-weight: 600; }
  .sync-status.error  { color: #ff6666; font-weight: 600; }

  /* ===== COMIC PANELS ===== */
  .panel {
    border: 3px solid #111;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  .panel::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 5px 5px;
    pointer-events: none;
  }

  .panel-caption {
    background: #f5c800;
    color: #111;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-bottom: 2px solid #111;
    display: inline-block;
  }

  .panel-caption.red {
    background: #cc1a1a;
    color: #fff;
  }

  /* ===== STONES PANEL ===== */
  .stones-panel {
    padding: 0;
  }

  .stones-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px 0 0;
    border-bottom: 2px solid #111;
  }

  .stones-count {
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    color: #f5c800;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    background: #111;
  }

  .stones-grid {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 20px 12px;
    background: radial-gradient(ellipse at 50% 100%, rgba(30,20,60,0.8) 0%, #141414 70%);
  }

  /* ===== GEM SHAPE ===== */
  .stone-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .stone {
    width: clamp(52px, 13vw, 68px);
    height: clamp(52px, 13vw, 68px);
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.1s ease;
  }

  .stone:active { transform: scale(0.85); }

  /* SVG gem */
  .stone svg.gem-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 0px transparent);
    transition: filter 0.4s ease;
  }

  /* Inactive gem faces */
  .gem-top    { fill: rgba(255,255,255,0.06); }
  .gem-left   { fill: rgba(0,0,0,0.3); }
  .gem-right  { fill: rgba(0,0,0,0.5); }
  .gem-bottom { fill: rgba(0,0,0,0.6); }
  .gem-outline { fill: none; stroke: #333; stroke-width: 1.5; }

  /* Active colored gems */
  .stone.done[data-color="space"] svg.gem-svg   { filter: drop-shadow(0 0 8px #1a4aff) drop-shadow(0 0 20px rgba(26,74,255,0.6)); }
  .stone.done[data-color="mind"] svg.gem-svg    { filter: drop-shadow(0 0 8px #f5c800) drop-shadow(0 0 20px rgba(245,200,0,0.6)); }
  .stone.done[data-color="reality"] svg.gem-svg { filter: drop-shadow(0 0 8px #cc1a1a) drop-shadow(0 0 20px rgba(204,26,26,0.6)); }
  .stone.done[data-color="power"] svg.gem-svg   { filter: drop-shadow(0 0 8px #9b30d4) drop-shadow(0 0 20px rgba(155,48,212,0.6)); }
  .stone.done[data-color="time"] svg.gem-svg    { filter: drop-shadow(0 0 8px #18a050) drop-shadow(0 0 20px rgba(24,160,80,0.6)); }

  .stone.done[data-color="space"]   .gem-top    { fill: #4a7aff; }
  .stone.done[data-color="space"]   .gem-left   { fill: #1a3acc; }
  .stone.done[data-color="space"]   .gem-right  { fill: #0a1a88; }
  .stone.done[data-color="space"]   .gem-bottom { fill: #060e55; }
  .stone.done[data-color="space"]   .gem-shine  { fill: rgba(200,220,255,0.4); }

  .stone.done[data-color="mind"]    .gem-top    { fill: #ffe040; }
  .stone.done[data-color="mind"]    .gem-left   { fill: #c8a000; }
  .stone.done[data-color="mind"]    .gem-right  { fill: #886800; }
  .stone.done[data-color="mind"]    .gem-bottom { fill: #553f00; }
  .stone.done[data-color="mind"]    .gem-shine  { fill: rgba(255,255,200,0.5); }

  .stone.done[data-color="reality"] .gem-top    { fill: #e84040; }
  .stone.done[data-color="reality"] .gem-left   { fill: #aa1010; }
  .stone.done[data-color="reality"] .gem-right  { fill: #770808; }
  .stone.done[data-color="reality"] .gem-bottom { fill: #440404; }
  .stone.done[data-color="reality"] .gem-shine  { fill: rgba(255,200,200,0.4); }

  .stone.done[data-color="power"]   .gem-top    { fill: #c060f0; }
  .stone.done[data-color="power"]   .gem-left   { fill: #7820aa; }
  .stone.done[data-color="power"]   .gem-right  { fill: #4e1277; }
  .stone.done[data-color="power"]   .gem-bottom { fill: #2e0844; }
  .stone.done[data-color="power"]   .gem-shine  { fill: rgba(220,180,255,0.4); }

  .stone.done[data-color="time"]    .gem-top    { fill: #40d070; }
  .stone.done[data-color="time"]    .gem-left   { fill: #108838; }
  .stone.done[data-color="time"]    .gem-right  { fill: #085a22; }
  .stone.done[data-color="time"]    .gem-bottom { fill: #043314; }
  .stone.done[data-color="time"]    .gem-shine  { fill: rgba(180,255,210,0.4); }

  .stone.done .gem-outline { stroke: rgba(255,255,255,0.3); }

  /* No persistent pulse border — glow only */

  /* Burst */
  .stone-burst {
    position: absolute;
    inset: -24px;
    pointer-events: none;
    z-index: 20;
  }

  .stone-burst::before, .stone-burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.2);
  }

  .stone.bursting[data-color="space"]   .stone-burst::before { background: radial-gradient(circle, rgba(74,122,255,0.8) 0%, transparent 65%); animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="mind"]    .stone-burst::before { background: radial-gradient(circle, rgba(255,224,64,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="reality"] .stone-burst::before { background: radial-gradient(circle, rgba(232,64,64,0.8) 0%, transparent 65%);   animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="power"]   .stone-burst::before { background: radial-gradient(circle, rgba(192,96,240,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }
  .stone.bursting[data-color="time"]    .stone-burst::before { background: radial-gradient(circle, rgba(64,208,112,0.8) 0%, transparent 65%);  animation: gem-burst 0.6s ease-out forwards; }

  .stone.bursting .stone-burst::after {
    background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
    animation: gem-burst2 0.8s ease-out 0.04s forwards;
  }

  @keyframes gem-burst  { 0% { transform: scale(0.2); opacity: 1; } 100% { transform: scale(3.5); opacity: 0; } }
  @keyframes gem-burst2 { 0% { transform: scale(0.2); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

  .stone-name {
    font-family: 'Oswald', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #444;
    text-align: center;
    transition: color 0.4s;
  }

  .stone.done[data-color="space"]   .stone-name { color: #4a7aff; }
  .stone.done[data-color="mind"]    .stone-name { color: #f5c800; }
  .stone.done[data-color="reality"] .stone-name { color: #e84040; }
  .stone.done[data-color="power"]   .stone-name { color: #c060f0; }
  .stone.done[data-color="time"]    .stone-name { color: #40d070; }

  /* ===== SOUL STONE PANEL ===== */
  .soul-panel {
    border-top: 0;
    padding: 0;
  }

  .soul-panel-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 20px;
    background: radial-gradient(ellipse at 50% 60%, rgba(80,30,0,0.5) 0%, #141414 70%);
    gap: 16px;
  }

  .soul-stone {
    width: clamp(130px, 36vw, 170px);
    height: clamp(130px, 36vw, 170px);
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.12s ease;
  }

  .soul-stone:active { transform: scale(0.92); }

  .soul-stone svg.gem-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 0px transparent);
    transition: filter 0.5s ease;
  }

  .soul-stone.done svg.gem-svg {
    filter: drop-shadow(0 0 14px #e86010) drop-shadow(0 0 40px rgba(232,96,16,0.7)) drop-shadow(0 0 80px rgba(232,96,16,0.3));
  }

  .soul-stone.done .gem-top    { fill: #ff9040; }
  .soul-stone.done .gem-left   { fill: #c04010; }
  .soul-stone.done .gem-right  { fill: #802808; }
  .soul-stone.done .gem-bottom { fill: #401404; }
  .soul-stone.done .gem-shine  { fill: rgba(255,230,180,0.45); }
  .soul-stone.done .gem-outline { stroke: rgba(255,200,100,0.35); }

  .soul-burst {
    position: absolute;
    inset: -40px;
    pointer-events: none;
    z-index: 20;
  }

  .soul-burst::before, .soul-burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.2);
  }

  .soul-stone.bursting .soul-burst::before {
    background: radial-gradient(circle, rgba(255,144,64,0.8) 0%, transparent 65%);
    animation: gem-burst 0.9s ease-out forwards;
  }
  .soul-stone.bursting .soul-burst::after {
    background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
    animation: gem-burst2 1.1s ease-out 0.06s forwards;
  }

  .soul-label {
    text-align: center;
  }

  .soul-label .soul-name {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    color: #e86010;
    letter-spacing: 0.1em;
    text-shadow: 2px 2px 0 #111;
  }

  .soul-label .soul-duration {
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    color: #555;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ===== SPEECH BUBBLE SUMMARY ===== */
  .bubble-panel {
    border-top: 0;
  }

  .speech-bubble {
    margin: 14px;
    background: var(--cream);
    color: #111;
    border: 2px solid #111;
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    font-family: 'Bangers', cursive;
    font-size: 1rem;
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 1.6;
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-bottom-color: #111;
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: var(--cream);
  }

  .bubble-count { color: #cc1a1a; }
  .bubble-soul  { color: #e86010; }

  .complete-msg {
    font-family: 'Bangers', cursive;
    font-size: 1.3rem;
    color: #9b30d4;
    letter-spacing: 0.08em;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 1s ease;
    text-shadow: 1px 1px 0 #111;
  }
  .complete-msg.show { opacity: 1; }

  /* ===== ACTION PANEL ===== */
  .action-panel {
    border-top: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #111;
  }

  .undo-btn {
    background: none;
    border: 1.5px solid #333;
    color: #555;
    font-family: 'Oswald', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .undo-btn:hover { border-color: #555; color: #888; }

  .reset-note {
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #333;
  }

  /* ===== HISTORY PANEL ===== */
  .history-panel {
    border-top: 0;
  }

  .history-body {
    padding: 8px 12px 4px;
  }

  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid #1e1e1e;
  }
  .history-row:last-child { border-bottom: none; }

  .history-date {
    font-family: 'Oswald', sans-serif;
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .history-pills { display: flex; gap: 6px; }

  .pill {
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .pill-short { background: rgba(26,74,255,0.15); color: #4a7aff; border: 1px solid rgba(26,74,255,0.2); }
  .pill-short.incomplete { background: transparent; color: #333; border-color: #222; }
  .pill-long  { background: rgba(232,96,16,0.15); color: #e86010; border: 1px solid rgba(232,96,16,0.2); }
  .pill-long.incomplete  { background: transparent; color: #333; border-color: #222; }

  .history-empty {
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    color: #333;
    text-align: center;
    padding: 20px 0;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Speed lines decoration on soul panel */
  .speed-lines {
    position: absolute;
    inset: 0;
    background: repeating-conic-gradient(from 0deg at 50% 50%, transparent 0deg, transparent 8deg, rgba(255,255,255,0.01) 8deg, rgba(255,255,255,0.01) 9deg);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="page">

  <!-- MASTHEAD -->
  <div class="masthead">
    <div class="masthead-inner">
      <div class="comic-title">The<br>Gauntlet</div>
      <div class="masthead-meta">
        <div class="issue-num" id="issue-num">#001</div>
        <div class="masthead-date" id="date-display"></div>
      </div>
    </div>
  </div>

  <!-- STONES PANEL -->
  <div class="panel stones-panel">
    <div class="stones-panel-header">
      <div class="panel-caption">2-minute stones</div>
      <div class="stones-count"><span id="short-count">0</span> / 5</div>
    </div>
    <div class="stones-grid" id="short-orbs"></div>
  </div>

  <!-- SOUL STONE PANEL -->
  <div class="panel soul-panel">
    <div class="panel-caption red">Soul Stone &mdash; 10 minutes</div>
    <div class="soul-panel-body" style="position:relative;">
      <div class="speed-lines"></div>
      <div class="soul-stone" id="long-orb" onclick="clickLong()" ontouchend="event.preventDefault();clickLong()">
        <div class="soul-burst"></div>
        <svg class="gem-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <polygon class="gem-bottom" points="50,95 10,60 90,60"/>
          <polygon class="gem-right"  points="50,95 90,60 75,20"/>
          <polygon class="gem-left"   points="50,95 10,60 25,20"/>
          <polygon class="gem-top"    points="25,20 50,5 75,20 50,55"/>
          <polygon class="gem-shine"  points="30,22 50,8 48,38" style="fill:rgba(255,255,255,0.06)"/>
          <polygon class="gem-outline" points="50,5 75,20 90,60 50,95 10,60 25,20" style="fill:none;stroke:#222;stroke-width:2"/>
        </svg>
      </div>
      <div class="soul-label">
        <div class="soul-name">Soul Stone</div>
        <div class="soul-duration">10-minute breath</div>
      </div>
    </div>
  </div>

  <!-- SPEECH BUBBLE PANEL -->
  <div class="panel bubble-panel">
    <div class="speech-bubble">
      <span class="bubble-count" id="short-done">0</span> of 5 stones &bull; Soul Stone <span class="bubble-soul" id="long-status">remaining</span>
      <div class="complete-msg" id="complete-msg">POWER INFINITE! ALL SIX COLLECTED!</div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="panel action-panel">
    <button class="undo-btn" onclick="undoLast()">↩ Undo last</button>
    <div class="reset-note">Resets at midnight</div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel history-panel">
    <div class="panel-caption">Past days</div>
    <div class="history-body">
      <div id="history-list"><div class="history-empty">No past sessions yet</div></div>
    </div>
  </div>

</div>

<script>
  const STONE_COLORS = ['space','mind','reality','power','time'];
  const STONE_NAMES  = ['Space','Mind','Reality','Power','Time'];

  // Unique gem cut per stone
  const GEM_SHAPES = {
    space: `<svg class="gem-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Space: tall narrow classic diamond -->
      <polygon class="gem-bottom" points="50,96 8,55 92,55"/>
      <polygon class="gem-right"  points="50,96 92,55 70,14"/>
      <polygon class="gem-left"   points="50,96 8,55 30,14"/>
      <polygon class="gem-top"    points="30,14 50,4 70,14 50,48"/>
      <polygon class="gem-shine"  points="34,16 50,6 48,34" style="fill:rgba(255,255,255,0.07)"/>
      <polygon class="gem-outline" points="50,4 70,14 92,55 50,96 8,55 30,14" style="fill:none;stroke:#222;stroke-width:2"/>
    </svg>`,
    mind: `<svg class="gem-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Mind: wide flat marquise/oval cut -->
      <polygon class="gem-bottom" points="50,90 6,52 94,52"/>
      <polygon class="gem-right"  points="50,90 94,52 80,22"/>
      <polygon class="gem-left"   points="50,90 6,52 20,22"/>
      <polygon class="gem-top"    points="20,22 50,10 80,22 50,46"/>
      <polygon class="gem-shine"  points="24,24 50,12 46,38" style="fill:rgba(255,255,255,0.07)"/>
      <polygon class="gem-outline" points="50,10 80,22 94,52 50,90 6,52 20,22" style="fill:none;stroke:#222;stroke-width:2"/>
    </svg>`,
    reality: `<svg class="gem-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Reality: asymmetric raw shard -->
      <polygon class="gem-bottom" points="50,94 10,58 88,62"/>
      <polygon class="gem-right"  points="50,94 88,62 78,16"/>
      <polygon class="gem-left"   points="50,94 10,58 26,20"/>
      <polygon class="gem-top"    points="26,20 50,6 78,16 50,52"/>
      <polygon class="gem-shine"  points="30,22 52,8 44,40" style="fill:rgba(255,255,255,0.07)"/>
      <polygon class="gem-outline" points="50,6 78,16 88,62 50,94 10,58 26,20" style="fill:none;stroke:#222;stroke-width:2"/>
    </svg>`,
    power: `<svg class="gem-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Power: squat hexagonal orb cut -->
      <polygon class="gem-bottom" points="50,92 12,62 88,62"/>
      <polygon class="gem-right"  points="50,92 88,62 76,24"/>
      <polygon class="gem-left"   points="50,92 12,62 24,24"/>
      <polygon class="gem-top"    points="24,24 50,12 76,24 50,54"/>
      <polygon class="gem-shine"  points="28,26 50,14 46,42" style="fill:rgba(255,255,255,0.07)"/>
      <polygon class="gem-outline" points="50,12 76,24 88,62 50,92 12,62 24,24" style="fill:none;stroke:#222;stroke-width:2"/>
    </svg>`,
    time: `<svg class="gem-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Time: elongated teardrop -->
      <polygon class="gem-bottom" points="50,97 14,56 86,56"/>
      <polygon class="gem-right"  points="50,97 86,56 66,10"/>
      <polygon class="gem-left"   points="50,97 14,56 34,10"/>
      <polygon class="gem-top"    points="34,10 50,2 66,10 50,44"/>
      <polygon class="gem-shine"  points="36,12 50,4 48,30" style="fill:rgba(255,255,255,0.07)"/>
      <polygon class="gem-outline" points="50,2 66,10 86,56 50,97 14,56 34,10" style="fill:none;stroke:#222;stroke-width:2"/>
    </svg>`
  };

  function gemSVG(color) {
    return GEM_SHAPES[color] || GEM_SHAPES.space;
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();

  let state = { short_count: 0, long_done: false };

  function setSyncStatus(msg, cls) {}  // silent

  async function loadAll() {
    try {
      const res = await fetch('/api/logs');
      if (!res.ok) throw new Error();
      const logs = await res.json();
      const today = todayStr();
      const todayLog = logs.find(l => l.date === today);
      if (todayLog) {
        state.short_count  = todayLog.short_count  ?? 0;
        state.long_done    = todayLog.long_done    ?? false;
        state.issue_number = todayLog.issue_number ?? null;
      }
      // If no entry for today yet, create one to get an issue number assigned
      if (!todayLog) {
        const r = await fetch('/api/logs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: today, short_count: 0, long_done: false })
        });
        if (r.ok) {
          const created = await r.json();
          state.issue_number = created.issue_number;
        }
      }
      setIssueNum(state.issue_number);
      buildStones(); updateUI();
      renderHistory(logs.filter(l => l.date !== today));
    } catch(e) {
      setSyncStatus('offline', 'error');
      buildStones(); updateUI(); renderHistory([]);
    }
  }

  function setIssueNum(n) {
    if (!n) return;
    document.getElementById('issue-num').textContent = '#' + String(n).padStart(3, '0');
  }

  async function saveState() {
    setSyncStatus('saving…', 'saving');
    try {
      const res = await fetch('/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: todayStr(), short_count: state.short_count, long_done: state.long_done })
      });
      if (!res.ok) throw new Error();
      const saved = await res.json();
      if (saved.issue_number) setIssueNum(saved.issue_number);
      setSyncStatus('saved ✓', 'saving');
      setTimeout(() => setSyncStatus(''), 2000);
    } catch(e) { setSyncStatus('save failed', 'error'); }
  }

  function buildStones() {
    const container = document.getElementById('short-orbs');
    container.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const wrap = document.createElement('div');
      wrap.className = 'stone-wrap';

      const stone = document.createElement('div');
      stone.className = 'stone' + (i < state.short_count ? ' done' : '');
      stone.id = `stone-${i}`;
      stone.dataset.color = STONE_COLORS[i];
      stone.innerHTML = `<div class="stone-burst"></div>${gemSVG(STONE_COLORS[i])}`;
      stone.addEventListener('click', () => clickStone(i));
      stone.addEventListener('touchend', (e) => { e.preventDefault(); clickStone(i); });

      const label = document.createElement('div');
      label.className = 'stone-name';
      label.textContent = STONE_NAMES[i];

      wrap.appendChild(stone);
      wrap.appendChild(label);
      container.appendChild(wrap);
    }
  }

  function clickStone(i) {
    if (i !== state.short_count) return;
    state.short_count++;
    saveState();
    const stone = document.getElementById(`stone-${i}`);
    stone.classList.add('bursting');
    setTimeout(() => { stone.classList.remove('bursting'); stone.classList.add('done'); }, 650);
    updateUI();
  }

  function clickLong() {
    if (state.long_done) return;
    state.long_done = true;
    saveState();
    const orb = document.getElementById('long-orb');
    orb.classList.add('bursting');
    setTimeout(() => { orb.classList.remove('bursting'); orb.classList.add('done'); }, 950);
    updateUI();
  }

  function undoLast() {
    if (state.long_done) { state.long_done = false; }
    else if (state.short_count > 0) { state.short_count--; }
    saveState(); buildStones(); updateUI();
  }

  function updateUI() {
    document.getElementById('short-count').textContent = state.short_count;
    document.getElementById('short-done').textContent  = state.short_count;
    document.getElementById('long-status').textContent = state.long_done ? 'collected!' : 'remaining';
    document.getElementById('complete-msg').classList.toggle('show', state.short_count >= 5 && state.long_done);
    document.getElementById('long-orb').classList.toggle('done', state.long_done);
  }

  function renderHistory(logs) {
    const list = document.getElementById('history-list');
    if (!logs || logs.length === 0) {
      list.innerHTML = '<div class="history-empty">No past sessions yet</div>';
      return;
    }
    list.innerHTML = logs.map(log => {
      const d = new Date(log.date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
      const sf = log.short_count >= 5, lf = log.long_done;
      return `<div class="history-row">
        <div class="history-date">${label}</div>
        <div class="history-pills">
          <span class="pill pill-short ${sf?'':'incomplete'}">${log.short_count}/5 stones</span>
          <span class="pill pill-long ${lf?'':'incomplete'}">${lf?'Soul ✓':'Soul —'}</span>
        </div>
      </div>`;
    }).join('');
  }

  loadAll();
</script>
</body>
</html>
