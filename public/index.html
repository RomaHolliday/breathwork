<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Breathwork</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Karla:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111009;
    --surface: #1a1710;
    --warm: #2a2418;
    --amber: #c8913a;
    --amber-bright: #e8b060;
    --copper: #a06828;
    --ash: #8a7e6e;
    --cream: #ede8df;
    --text: #c8bfaa;
    --text-dim: #5a5040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px 80px;
    overflow-x: hidden;
    position: relative;
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 60% at 10% 100%, rgba(100,60,10,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 90% 5%, rgba(80,50,10,0.14) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(60,40,10,0.08) 0%, transparent 70%);
  }

  .ember {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: ember-breathe ease-in-out infinite;
  }

  .ember-1 {
    width: 500px; height: 300px;
    background: radial-gradient(ellipse, rgba(180,100,20,0.12) 0%, transparent 70%);
    bottom: -50px; left: -100px;
    animation-duration: 18s;
  }

  .ember-2 {
    width: 400px; height: 250px;
    background: radial-gradient(ellipse, rgba(140,80,15,0.08) 0%, transparent 70%);
    top: 10%; right: -80px;
    animation-duration: 24s;
    animation-delay: -8s;
  }

  .ember-3 {
    width: 300px; height: 200px;
    background: radial-gradient(ellipse, rgba(200,130,40,0.06) 0%, transparent 70%);
    top: 40%; left: 20%;
    animation-duration: 30s;
    animation-delay: -14s;
  }

  @keyframes ember-breathe {
    0%   { transform: scale(1) translateY(0); opacity: 0.7; }
    50%  { transform: scale(1.15) translateY(-20px); opacity: 1; }
    100% { transform: scale(1) translateY(0); opacity: 0.7; }
  }

  .ash-particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,160,80,0.07) 0%, transparent 70%);
    animation: ash-drift linear infinite;
  }

  @keyframes ash-drift {
    0%   { transform: translateY(110vh) scale(0.7); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 0.5; }
    100% { transform: translateY(-15vh) scale(1.2); opacity: 0; }
  }

  .container {
    width: 100%;
    max-width: 640px;
    position: relative;
    z-index: 1;
    padding-top: 56px;
  }

  header { text-align: center; margin-bottom: 64px; }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3rem, 10vw, 4.5rem);
    letter-spacing: 0.14em;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 0.68rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .date-display {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ash);
    margin-top: 14px;
  }

  .sync-status {
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 8px;
    height: 16px;
    transition: color 0.4s;
  }
  .sync-status.saving { color: var(--amber); }
  .sync-status.error  { color: #c97a6b; }

  .section { margin-bottom: 48px; }

  .section-label {
    font-size: 0.62rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 28px;
    text-align: center;
  }

  .orb-row {
    display: flex;
    gap: clamp(12px, 4vw, 24px);
    justify-content: center;
  }

  .orb {
    width: clamp(62px, 15vw, 88px);
    height: clamp(62px, 15vw, 88px);
    border-radius: 50%;
    border: 1.5px solid rgba(200,145,58,0.2);
    background: radial-gradient(circle at 35% 30%, #211d13, #15120b);
    cursor: pointer;
    position: relative;
    transition: border-color 0.3s ease, transform 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  .orb:active { transform: scale(0.92); }

  .orb-face {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb-inner {
    width: 36%; height: 36%;
    border-radius: 50%;
    background: rgba(200,145,58,0.08);
    border: 1px solid rgba(200,145,58,0.18);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .orb.done {
    border-color: rgba(200,145,58,0.6);
    background: radial-gradient(circle at 35% 30%, #2e2410, #1a1408);
  }

  .orb.done .orb-inner {
    background: radial-gradient(circle at 30% 30%, #e8b060, #8a5018);
    border-color: var(--amber);
    box-shadow: 0 0 16px rgba(200,145,58,0.5), 0 0 40px rgba(200,145,58,0.2);
    width: 52%; height: 52%;
  }

  .orb.done::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(200,145,58,0.15);
    animation: pulse-ring 2.8s ease infinite;
  }

  @keyframes pulse-ring {
    0%   { transform: scale(0.88); opacity: 0.9; }
    50%  { transform: scale(1.08); opacity: 0.2; }
    100% { transform: scale(0.88); opacity: 0.9; }
  }

  .burst {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 10;
  }

  .burst::before, .burst::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    opacity: 0;
    transform: scale(0.5);
  }

  .orb.bursting .burst::before {
    background: radial-gradient(circle, rgba(232,176,96,0.55) 0%, transparent 65%);
    animation: burst-1 0.7s ease-out forwards;
  }
  .orb.bursting .burst::after {
    background: radial-gradient(circle, rgba(200,145,58,0.3) 0%, transparent 70%);
    animation: burst-2 0.9s ease-out 0.05s forwards;
  }

  @keyframes burst-1 {
    0%   { transform: scale(0.5); opacity: 0.9; }
    100% { transform: scale(3.2); opacity: 0; }
  }
  @keyframes burst-2 {
    0%   { transform: scale(0.5); opacity: 0.7; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  .long-breath-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .long-orb {
    width: clamp(160px, 42vw, 210px);
    height: clamp(160px, 42vw, 210px);
    border-radius: 50%;
    border: 1.5px solid rgba(200,145,58,0.2);
    background: radial-gradient(circle at 35% 30%, #221c0e, #131009);
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
    transition: border-color 0.5s ease, transform 0.15s ease;
    touch-action: manipulation;
  }

  .long-orb:active { transform: scale(0.95); }

  .long-orb-face {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .long-orb-inner {
    width: 38%; height: 38%;
    border-radius: 50%;
    background: rgba(200,145,58,0.07);
    border: 1px solid rgba(200,145,58,0.18);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .long-orb-inner svg {
    width: 40%; height: 40%;
    opacity: 0.35;
    transition: opacity 0.5s;
    color: var(--amber);
  }

  .long-orb.done {
    border-color: rgba(200,145,58,0.65);
    background: radial-gradient(circle at 35% 30%, #2e2410, #181208);
  }

  .long-orb.done .long-orb-inner {
    background: radial-gradient(circle at 30% 30%, #f0c070, #8a5018);
    border-color: var(--amber-bright);
    box-shadow: 0 0 30px rgba(200,145,58,0.65), 0 0 80px rgba(200,145,58,0.25);
    width: 55%; height: 55%;
  }

  .long-orb.done .long-orb-inner svg { opacity: 1; color: #fff3d0; }

  .long-orb.done::after {
    content: '';
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    border: 1px solid rgba(200,145,58,0.18);
    animation: pulse-ring 3.2s ease infinite;
  }

  .long-orb .burst::before {
    background: radial-gradient(circle, rgba(240,192,112,0.55) 0%, transparent 65%);
  }
  .long-orb .burst::after {
    background: radial-gradient(circle, rgba(200,145,58,0.3) 0%, transparent 70%);
  }
  .long-orb.bursting .burst::before { animation: burst-1 0.9s ease-out forwards; }
  .long-orb.bursting .burst::after  { animation: burst-2 1.1s ease-out 0.06s forwards; }

  .long-label { text-align: center; }

  .long-label .duration {
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(200,145,58,0.5);
  }

  .long-label .name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: rgba(200,145,58,0.72);
    margin-top: 4px;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,145,58,0.1), transparent);
    margin: 12px 0 40px;
  }

  .summary {
    text-align: center;
    padding: 24px 20px;
    background: rgba(26,20,10,0.6);
    border: 1px solid rgba(200,145,58,0.1);
    border-radius: 6px;
    backdrop-filter: blur(8px);
  }

  .summary-line {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--ash);
    line-height: 1.9;
  }

  .summary-line span { color: var(--cream); font-style: normal; }

  .complete-msg {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--cream);
    margin-top: 10px;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .complete-msg.show { opacity: 1; }

  .undo-btn {
    background: none;
    border: 1px solid rgba(200,145,58,0.15);
    color: var(--text-dim);
    font-family: 'Karla', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    margin-top: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    touch-action: manipulation;
  }
  .undo-btn:hover { border-color: rgba(200,145,58,0.3); color: var(--ash); }

  .reset-note {
    text-align: center;
    margin-top: 14px;
    font-size: 0.6rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: 0.6;
  }

  .history-section {
    margin-top: 56px;
    border-top: 1px solid rgba(200,145,58,0.07);
    padding-top: 36px;
  }

  .history-title {
    font-size: 0.62rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
    text-align: center;
  }

  .history-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 0;
    border-bottom: 1px solid rgba(200,145,58,0.05);
  }
  .history-row:last-child { border-bottom: none; }

  .history-date {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ash);
  }

  .history-pills { display: flex; gap: 8px; align-items: center; }

  .pill {
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
  }

  .pill-short {
    background: rgba(200,145,58,0.12);
    color: var(--amber);
    border: 1px solid rgba(200,145,58,0.2);
  }
  .pill-short.incomplete {
    background: rgba(200,145,58,0.04);
    color: var(--text-dim);
    border-color: rgba(200,145,58,0.08);
  }
  .pill-long {
    background: rgba(200,145,58,0.12);
    color: var(--amber-bright);
    border: 1px solid rgba(200,145,58,0.2);
  }
  .pill-long.incomplete {
    background: rgba(200,145,58,0.03);
    color: var(--text-dim);
    border-color: rgba(200,145,58,0.07);
  }

  .history-empty {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--text-dim);
    text-align: center;
    padding: 24px 0;
  }
</style>
</head>
<body>

<div class="bg-layer">
  <div class="ember ember-1"></div>
  <div class="ember ember-2"></div>
  <div class="ember ember-3"></div>
  <div id="ash-layer"></div>
</div>

<div class="container">
  <header>
    <div class="title">Breathwork</div>
    <div class="subtitle">Daily practice</div>
    <div class="date-display" id="date-display"></div>
    <div class="sync-status" id="sync-status"></div>
  </header>

  <div class="section">
    <div class="section-label">2-minute breaths &mdash; <span id="short-count">0</span> of 5</div>
    <div class="orb-row" id="short-orbs"></div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">Extended breath</div>
    <div class="long-breath-wrap">
      <div class="long-orb" id="long-orb" onclick="clickLong()">
        <div class="burst"></div>
        <div class="long-orb-face">
          <div class="long-orb-inner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
              <path d="M12 2C12 2 4 8 4 13a8 8 0 0 0 16 0c0-5-8-11-8-11z"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="long-label">
        <div class="duration">10 minutes</div>
        <div class="name">Deep stillness</div>
      </div>
    </div>
  </div>

  <div class="summary">
    <div class="summary-line">
      <span id="short-done">0</span> of 5 short &nbsp;&bull;&nbsp; long breath <span id="long-status">remaining</span>
    </div>
    <div class="complete-msg" id="complete-msg">Today's practice is complete ✦</div>
  </div>

  <button class="undo-btn" onclick="undoLast()">undo last</button>
  <div class="reset-note">Resets at midnight</div>

  <div class="history-section">
    <div class="history-title">Past days</div>
    <div id="history-list"><div class="history-empty">Loading…</div></div>
  </div>
</div>

<script>
  const ashLayer = document.getElementById('ash-layer');
  for (let i = 0; i < 7; i++) {
    const p = document.createElement('div');
    p.className = 'ash-particle';
    const size = 180 + Math.random() * 280;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*110-5}vw;animation-duration:${24+Math.random()*28}s;animation-delay:${-Math.random()*32}s`;
    ashLayer.appendChild(p);
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  let state = { short_count: 0, long_done: false };

  function setSyncStatus(msg, cls = '') {
    const el = document.getElementById('sync-status');
    el.textContent = msg;
    el.className = 'sync-status ' + cls;
  }

  async function loadAll() {
    try {
      const res = await fetch('/api/logs');
      const logs = await res.json();
      const today = todayStr();
      const todayLog = logs.find(l => l.date === today);
      if (todayLog) { state.short_count = todayLog.short_count; state.long_done = todayLog.long_done; }
      buildOrbs(); updateUI();
      renderHistory(logs.filter(l => l.date !== today));
    } catch(e) {
      setSyncStatus('offline — changes may not save', 'error');
      buildOrbs(); updateUI(); renderHistory([]);
    }
  }

  async function saveState() {
    setSyncStatus('saving…', 'saving');
    try {
      await fetch('/api/logs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date: todayStr(), ...state })
      });
      setSyncStatus('saved', 'saving');
      setTimeout(() => setSyncStatus(''), 1800);
    } catch(e) { setSyncStatus('save failed', 'error'); }
  }

  function buildOrbs() {
    const container = document.getElementById('short-orbs');
    container.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const orb = document.createElement('div');
      orb.className = 'orb' + (i < state.short_count ? ' done' : '');
      orb.id = `orb-${i}`;
      orb.innerHTML = `<div class="burst"></div><div class="orb-face"><div class="orb-inner"></div></div>`;
      orb.onclick = () => clickShort(i);
      container.appendChild(orb);
    }
  }

  function clickShort(i) {
    if (i !== state.short_count) return;
    state.short_count++;
    saveState();
    const orb = document.getElementById(`orb-${i}`);
    orb.classList.add('bursting');
    setTimeout(() => { orb.classList.remove('bursting'); orb.classList.add('done'); }, 700);
    updateUI();
  }

  function clickLong() {
    if (state.long_done) return;
    state.long_done = true;
    saveState();
    const orb = document.getElementById('long-orb');
    orb.classList.add('bursting');
    setTimeout(() => { orb.classList.remove('bursting'); orb.classList.add('done'); }, 900);
    updateUI();
  }

  function undoLast() {
    if (state.long_done) { state.long_done = false; }
    else if (state.short_count > 0) { state.short_count--; }
    saveState(); buildOrbs(); updateUI();
  }

  function updateUI() {
    document.getElementById('short-count').textContent = state.short_count;
    document.getElementById('short-done').textContent = state.short_count;
    document.getElementById('long-status').textContent = state.long_done ? 'complete' : 'remaining';
    document.getElementById('complete-msg').classList.toggle('show', state.short_count >= 5 && state.long_done);
    document.getElementById('long-orb').classList.toggle('done', state.long_done);
  }

  function renderHistory(logs) {
    const list = document.getElementById('history-list');
    if (!logs || logs.length === 0) {
      list.innerHTML = '<div class="history-empty">No past sessions yet</div>';
      return;
    }
    list.innerHTML = logs.map(log => {
      const d = new Date(log.date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const shortFull = log.short_count >= 5;
      const longFull = log.long_done;
      return `<div class="history-row">
        <div class="history-date">${label}</div>
        <div class="history-pills">
          <span class="pill pill-short ${shortFull?'':'incomplete'}">${log.short_count}/5 short</span>
          <span class="pill pill-long ${longFull?'':'incomplete'}">${longFull?'10 min ✓':'10 min —'}</span>
        </div>
      </div>`;
    }).join('');
  }

  loadAll();
</script>
</body>
</html>
